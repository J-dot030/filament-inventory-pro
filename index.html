<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpoolVault — Filament Inventory System</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/@zxing/library@0.20.0"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --surface-hover: #1f1f1f;
            --yellow: #FFD700;
            --yellow-dim: rgba(255, 215, 0, 0.2);
            --border: #333333;
            --text: #ffffff;
            --text-dim: #888888;
            --red: #FF4444;
            --green: #00FF88;
            --blue: #4A9EFF;
            --purple: #9D4EDD;
        }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15), rgba(0,0,0,0.15) 1px, transparent 1px, transparent 2px);
            pointer-events: none; z-index: 999;
        }
        
        .container { max-width: 600px; margin: 0 auto; position: relative; padding-bottom: 120px; }
        
        header { background: var(--surface); border-bottom: 2px solid var(--yellow); padding: 16px 20px; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(255, 215, 0, 0.1); }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .logo-container { display: flex; align-items: center; gap: 12px; }
        .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--yellow) 0%, #FFA500 100%); border-radius: 8px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(255, 215, 0, 0.3); position: relative; overflow: hidden; }
        .logo-icon::before { content: ''; position: absolute; inset: 0; background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.3) 50%, transparent 70%); }
        .logo-icon svg { width: 22px; height: 22px; position: relative; z-index: 1; }
        .logo-text { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 800; color: var(--yellow); letter-spacing: 0.5px; }
        .logo-subtext { font-size: 9px; color: var(--text-dim); font-weight: 600; letter-spacing: 2px; margin-top: -2px; }
        .sync-status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--green); font-weight: 700; font-family: 'JetBrains Mono', monospace; }
        .sync-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 8px var(--green); } 50% { opacity: 0.5; transform: scale(0.8); } }
        
        .user-bar { display: flex; justify-content: space-between; align-items: center; }
        .user-info { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-dim); display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 6px 10px; border-radius: 4px; transition: 0.2s; }
        .user-info:hover { background: var(--surface-hover); color: var(--yellow); }
        .user-count { background: var(--yellow); color: var(--bg); padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 800; }
        .btn-group { display: flex; gap: 8px; }
        .header-btn { background: transparent; border: 1px solid var(--border); color: var(--text-dim); padding: 6px 12px; border-radius: 4px; font-size: 11px; font-weight: 700; cursor: pointer; transition: 0.2s; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; }
        .header-btn:hover { border-color: var(--yellow); color: var(--yellow); }
        
        .stats { padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; border-left: 3px solid var(--yellow); }
        .stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; font-weight: 700; letter-spacing: 1px; margin-bottom: 4px; }
        .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 28px; font-weight: 800; color: var(--text); }
        
        .tabs { display: flex; padding: 0 20px; gap: 8px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; text-align: center; font-weight: 700; font-size: 12px; cursor: pointer; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
        .tab.active { background: var(--yellow-dim); color: var(--yellow); border-color: var(--yellow); }
        
        .search { padding: 0 20px; margin-bottom: 24px; }
        .search-input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 14px 16px; color: var(--text); font-size: 14px; outline: none; font-family: 'JetBrains Mono', monospace; }
        .search-input:focus { border-color: var(--yellow); box-shadow: 0 0 15px var(--yellow-dim); }
        
        .inventory { padding: 0 20px; }
        .item { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 16px; display: grid; grid-template-columns: 70px 1fr 60px auto auto; gap: 12px; align-items: center; margin-bottom: 12px; }
        .item:hover { border-color: var(--yellow); }
        .item-id { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 800; color: var(--bg); background: var(--yellow); padding: 6px 8px; border-radius: 4px; text-align: center; word-break: break-all; }
        .item.box .item-id { background: var(--green); }
        .item-info { display: flex; flex-direction: column; }
        .item-brand { font-weight: 700; font-size: 14px; margin-bottom: 2px; }
        .item-meta { font-size: 11px; color: var(--text-dim); }
        .item-qty { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 800; color: var(--yellow); text-align: center; }
        
        .item-actions { display: flex; gap: 6px; }
        .action-btn { width: 32px; height: 32px; background: var(--surface-hover); border: 1px solid var(--border); border-radius: 4px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .action-btn:hover { border-color: var(--yellow); }
        .action-btn.delete:hover { border-color: var(--red); color: var(--red); }
        
        .actions { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 600px; background: var(--bg); border-top: 2px solid var(--yellow); padding: 12px 20px; display: flex; gap: 10px; z-index: 50; }
        .btn-main { flex: 2; padding: 14px; border-radius: 6px; border: none; background: var(--yellow); color: var(--bg); font-weight: 800; font-size: 12px; cursor: pointer; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; }
        .btn-secondary { flex: 1; padding: 14px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); font-weight: 700; font-size: 11px; cursor: pointer; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; }
        .btn-secondary:hover { border-color: var(--yellow); color: var(--yellow); }
        .btn-danger { border-color: var(--red); color: var(--red); }
        .btn-danger:hover { background: rgba(255, 68, 68, 0.1); border-color: var(--red); }
        
        .camera { position: fixed; inset: 0; background: #000; z-index: 400; display: none; flex-direction: column; }
        .camera.active { display: flex; }
        .camera-header { padding: 20px; display: flex; justify-content: space-between; position: absolute; width: 100%; z-index: 20; }
        .camera-badge { background: var(--yellow); color: var(--bg); padding: 6px 12px; border-radius: 4px; font-weight: 800; font-size: 11px; font-family: 'JetBrains Mono', monospace; }
        .camera-badge.delete { background: var(--red); }
        .camera-badge.empty { background: var(--blue); }
        .camera-close { background: rgba(0,0,0,0.5); border: 1px solid var(--yellow); color: var(--yellow); width: 36px; height: 36px; border-radius: 4px; font-size: 18px; cursor: pointer; }
        #video { flex: 1; object-fit: cover; width: 100%; height: 100%; }
        
        .camera-controls { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); text-align: center; width: 100%; }
        .shutter { width: 72px; height: 72px; border: 4px solid var(--yellow); background: var(--yellow-dim); border-radius: 50%; cursor: pointer; box-shadow: 0 0 20px rgba(255,215,0,0.4); }
        .shutter:active { background: var(--yellow); transform: scale(0.95); }
        .shutter.delete { border-color: var(--red); background: rgba(255,68,68,0.2); box-shadow: 0 0 20px rgba(255,68,68,0.4); }
        .shutter.delete:active { background: var(--red); }
        .shutter.empty { border-color: var(--blue); background: rgba(74,158,255,0.2); box-shadow: 0 0 20px rgba(74,158,255,0.4); }
        .shutter.empty:active { background: var(--blue); }
        #canvas { display: none; }
        
        .processing { position: absolute; inset: 0; background: rgba(0, 0, 0, 0.85); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 20; }
        .processing.active { display: flex; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--surface); border-top: 4px solid var(--yellow); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .process-text { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700; color: var(--yellow); }
        
        /* BARCODE SCANNER - OVERLAY MODE */
        .barcode-scanner { position: absolute; inset: 0; background: transparent; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 15; padding: 20px; }
        .barcode-scanner.active { display: flex; }
        .scanner-overlay { display: flex; flex-direction: column; align-items: center; width: 100%; }
        .barcode-frame { position: relative; width: 90%; max-width: 500px; height: 250px; border: 4px solid var(--yellow); border-radius: 12px; margin-bottom: 24px; overflow: visible; background: transparent; box-shadow: 0 0 30px rgba(255, 215, 0, 0.4); }
        .barcode-line { position: absolute; width: 100%; height: 4px; background: var(--yellow); box-shadow: 0 0 25px var(--yellow), 0 0 50px var(--yellow); animation: scan 1s linear infinite; z-index: 20; }
        @keyframes scan { 0%, 100% { top: 10%; opacity: 0.6; } 50% { top: 80%; opacity: 1; } }
        .barcode-hint { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 800; color: var(--yellow); text-align: center; margin-bottom: 20px; background: rgba(0, 0, 0, 0.9); padding: 12px 24px; border-radius: 8px; border: 2px solid var(--yellow); box-shadow: 0 0 25px rgba(255, 215, 0, 0.4); }
        .barcode-result { font-family: 'JetBrains Mono', monospace; font-size: 18px; color: var(--green); font-weight: 800; margin-top: 20px; background: rgba(0, 0, 0, 0.9); padding: 12px 24px; border-radius: 8px; border: 2px solid var(--green); box-shadow: 0 0 25px rgba(0, 255, 136, 0.4); min-height: 24px; }
        
        .qr-prompt { position: absolute; inset: 0; background: rgba(0, 0, 0, 0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 30; padding: 40px; }
        .qr-prompt.active { display: flex; }
        .qr-icon { width: 80px; height: 80px; border: 3px solid var(--purple); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 48px; margin-bottom: 24px; background: rgba(157, 78, 221, 0.1); animation: pulse-qr 2s infinite; }
        @keyframes pulse-qr { 0%, 100% { box-shadow: 0 0 20px rgba(157, 78, 221, 0.4); } 50% { box-shadow: 0 0 40px rgba(157, 78, 221, 0.8); } }
        .qr-title { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 800; color: var(--purple); margin-bottom: 12px; text-align: center; }
        .qr-message { font-size: 14px; color: var(--text-dim); text-align: center; margin-bottom: 32px; max-width: 400px; line-height: 1.6; }
        .qr-buttons { display: flex; gap: 12px; }
        .qr-btn { padding: 14px 24px; border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-weight: 800; font-size: 12px; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .qr-btn-primary { background: var(--purple); color: white; border: none; }
        .qr-btn-primary:hover { background: #8B3FC9; }
        .qr-btn-secondary { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
        .qr-btn-secondary:hover { border-color: var(--purple); color: var(--purple); }
        
        .modal { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); z-index: 450; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal.open { display: flex; }
        .modal-content { background: var(--surface); border: 2px solid var(--yellow); border-radius: 8px; padding: 24px; width: 100%; max-width: 400px; max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 16px; margin-bottom: 20px; }
        .modal-title { font-family: 'JetBrains Mono', monospace; font-weight: 800; color: var(--yellow); font-size: 16px; }
        
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 10px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; }
        .form-input, .form-select { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 12px; color: var(--text); font-size: 14px; outline: none; font-family: 'Inter', sans-serif; }
        .form-input:focus, .form-select:focus { border-color: var(--yellow); }
        .form-input[readonly] { color: var(--yellow); font-family: 'JetBrains Mono', monospace; font-weight: 700; background: var(--surface-hover); }
        
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--yellow); color: var(--bg); padding: 12px 24px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-weight: 800; font-size: 12px; z-index: 600; display: none; text-align: center; }
        .toast.error { background: var(--red); color: white; }
        
        .login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 500; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-screen.hidden { display: none; }
        .login-box { background: var(--surface); border: 2px solid var(--border); border-left: 4px solid var(--yellow); border-radius: 8px; padding: 32px; width: 100%; max-width: 360px; }
        .login-logo-big { display: flex; flex-direction: column; align-items: center; margin-bottom: 32px; }
        .login-logo-icon { width: 64px; height: 64px; background: linear-gradient(135deg, var(--yellow) 0%, #FFA500 100%); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 36px; box-shadow: 0 0 30px rgba(255, 215, 0, 0.4); margin-bottom: 16px; }
        .login-logo-text { font-family: 'JetBrains Mono', monospace; font-size: 24px; font-weight: 900; color: var(--yellow); letter-spacing: 1px; }
        .login-logo-sub { font-size: 11px; color: var(--text-dim); font-weight: 600; letter-spacing: 3px; margin-top: 4px; }
        
        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-dim); }
        
        .category-grid { padding: 0 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
        .category-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; cursor: pointer; transition: 0.2s; position: relative; overflow: hidden; }
        .category-card:hover { border-color: var(--yellow); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(255, 215, 0, 0.2); }
        .category-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--yellow); }
        .category-type { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 800; color: var(--yellow); margin-bottom: 4px; }
        .category-color { font-size: 12px; color: var(--text); font-weight: 600; margin-bottom: 8px; }
        .category-count { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 800; color: var(--text); }
        .category-label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
        
        .back-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text-dim); padding: 10px 16px; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; margin: 0 20px 16px 20px; display: inline-flex; align-items: center; gap: 8px; font-family: 'JetBrains Mono', monospace; }
        .back-btn:hover { border-color: var(--yellow); color: var(--yellow); }
        
        .inventory.detail-view .item { grid-template-columns: 100px 1fr auto; }
        .inventory.detail-view .item-qty { display: none; }
        
        .user-list { max-height: 300px; overflow-y: auto; }
        .user-item { background: var(--surface-hover); border: 1px solid var(--border); border-radius: 6px; padding: 12px 16px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .user-item-info { display: flex; flex-direction: column; }
        .user-item-name { font-weight: 700; font-size: 14px; color: var(--text); margin-bottom: 2px; }
        .user-item-time { font-size: 11px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }
        .user-badge { background: var(--green); color: var(--bg); padding: 4px 8px; border-radius: 4px; font-size: 9px; font-weight: 800; font-family: 'JetBrains Mono', monospace; }
        .user-badge.you { background: var(--yellow); }
        
        .delete-list { max-height: 400px; overflow-y: auto; }
        .delete-item { background: var(--surface-hover); border: 1px solid var(--border); border-radius: 6px; padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
        .delete-item:hover { border-color: var(--red); background: rgba(255, 68, 68, 0.05); }
        .delete-item-info { display: flex; flex-direction: column; }
        .delete-item-id { font-family: 'JetBrains Mono', monospace; font-weight: 800; font-size: 13px; color: var(--yellow); margin-bottom: 2px; }
        .delete-item-desc { font-size: 11px; color: var(--text-dim); }
        .delete-icon { color: var(--red); font-size: 18px; }
    </style>
</head>
<body>

<div class="login-screen" id="login-screen">
