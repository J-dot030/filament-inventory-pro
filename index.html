<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Filament Inventory Pro — AI Powered</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { 
            --bg: #0a0a0a; 
            --surface: #141414; 
            --yellow: #FFD700; 
            --yellow-dim: rgba(255, 215, 0, 0.2); 
            --border: #333333; 
            --text: #ffffff; 
            --text-dim: #888888; 
            --red: #FF4444; 
            --green: #00FF88; 
            --blue: #4488FF; 
            --purple: #BB88FF; 
        }
        body { 
            font-family: 'Rajdhani', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            min-height: 100vh; 
            overflow-x: hidden;
            position: relative;
        }
        
        /* Animated Background Grid */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                repeating-linear-gradient(90deg, rgba(255, 215, 0, 0.03) 0px, transparent 1px, transparent 50px, rgba(255, 215, 0, 0.03) 51px),
                repeating-linear-gradient(0deg, rgba(255, 215, 0, 0.03) 0px, transparent 1px, transparent 50px, rgba(255, 215, 0, 0.03) 51px);
            pointer-events: none;
            z-index: 1;
            animation: gridPulse 3s ease-in-out infinite;
        }
        
        @keyframes gridPulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }
        
        /* Scan line effect */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--yellow), transparent);
            animation: scanLine 4s linear infinite;
            z-index: 2;
            pointer-events: none;
            opacity: 0.5;
        }
        
        @keyframes scanLine {
            0% { transform: translateY(0); }
            100% { transform: translateY(100vh); }
        }

        .container { max-width: 600px; margin: 0 auto; padding-bottom: 140px; position: relative; z-index: 10; }
        
        header { 
            background: linear-gradient(135deg, rgba(20, 20, 20, 0.95), rgba(40, 40, 40, 0.95)); 
            border-bottom: 3px solid var(--yellow); 
            padding: 20px; 
            position: sticky; 
            top: 0; 
            z-index: 100;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.2);
            animation: slideDown 0.5s ease-out;
        }
        
        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .logo { 
            font-family: 'Orbitron', monospace; 
            font-size: 22px; 
            font-weight: 900; 
            color: var(--yellow); 
            display: flex; 
            align-items: center; 
            gap: 10px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            animation: glow 2s ease-in-out infinite;
        }
        
        @keyframes glow {
            0%, 100% { text-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }
            50% { text-shadow: 0 0 30px rgba(255, 215, 0, 0.8), 0 0 40px rgba(255, 215, 0, 0.4); }
        }
        
        .header-info { 
            font-size: 11px; 
            color: var(--text-dim); 
            margin-top: 10px; 
            font-weight: 600;
            letter-spacing: 1px;
        }
        .header-info span { 
            color: var(--yellow); 
            cursor: pointer; 
            font-weight: bold; 
            transition: all 0.3s ease;
            padding: 4px 8px;
            border-radius: 4px;
        }
        .header-info span:hover {
            background: var(--yellow-dim);
            transform: scale(1.05);
        }
        
        .stats { 
            padding: 20px; 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            gap: 12px;
            animation: fadeInUp 0.6s ease-out 0.2s both;
        }
        
        @keyframes fadeInUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .stat-card { 
            background: linear-gradient(135deg, rgba(30, 30, 30, 0.8), rgba(20, 20, 20, 0.8)); 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            padding: 16px; 
            border-left: 4px solid var(--yellow);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.1), transparent);
            transition: left 0.5s ease;
        }
        
        .stat-card:hover::before {
            left: 100%;
        }
        
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(255, 215, 0, 0.2);
            border-color: var(--yellow);
        }
        
        .stat-card.low { border-left-color: var(--red); }
        .stat-value { 
            font-family: 'Orbitron', monospace; 
            font-size: 28px; 
            font-weight: 900;
            background: linear-gradient(135deg, var(--yellow), #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stat-label { 
            font-size: 10px; 
            color: var(--text-dim); 
            text-transform: uppercase; 
            margin-bottom: 6px; 
            font-weight: 700;
            letter-spacing: 2px;
        }
        
        .tabs { 
            display: flex; 
            padding: 0 20px; 
            gap: 8px; 
            margin-bottom: 20px; 
            overflow-x: auto;
            animation: fadeInUp 0.6s ease-out 0.3s both;
        }
        .tab { 
            flex-shrink: 0; 
            padding: 12px 18px; 
            background: rgba(30, 30, 30, 0.6); 
            border: 2px solid var(--border); 
            border-radius: 8px; 
            text-align: center; 
            font-size: 12px; 
            cursor: pointer; 
            color: var(--text-dim); 
            text-transform: uppercase; 
            font-weight: 700; 
            white-space: nowrap;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }
        .tab:hover {
            border-color: var(--yellow);
            transform: translateY(-2px);
        }
        .tab.active { 
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 215, 0, 0.1)); 
            color: var(--yellow); 
            border-color: var(--yellow);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }
        
        .search-bar { 
            padding: 0 20px 20px;
            animation: fadeInUp 0.6s ease-out 0.4s both;
        }
        .search-input { 
            width: 100%; 
            background: rgba(30, 30, 30, 0.8); 
            border: 2px solid var(--border); 
            border-radius: 10px; 
            padding: 14px 18px; 
            color: var(--text); 
            outline: none; 
            font-family: 'Rajdhani', sans-serif; 
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .search-input:focus {
            border-color: var(--yellow);
            background: rgba(40, 40, 40, 0.8);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }
        
        .inventory { 
            padding: 0 20px;
        }
        .item { 
            background: linear-gradient(135deg, rgba(30, 30, 30, 0.6), rgba(20, 20, 20, 0.6)); 
            border: 1px solid var(--border); 
            border-radius: 10px; 
            padding: 16px; 
            display: flex; 
            align-items: center; 
            gap: 14px; 
            margin-bottom: 10px; 
            cursor: pointer; 
            transition: all 0.3s ease;
            animation: fadeInUp 0.4s ease-out both;
        }
        .item:nth-child(1) { animation-delay: 0.1s; }
        .item:nth-child(2) { animation-delay: 0.15s; }
        .item:nth-child(3) { animation-delay: 0.2s; }
        .item:nth-child(4) { animation-delay: 0.25s; }
        .item:nth-child(5) { animation-delay: 0.3s; }
        
        .item:hover { 
            transform: translateX(8px) scale(1.02); 
            background: linear-gradient(135deg, rgba(40, 40, 40, 0.8), rgba(30, 30, 30, 0.8));
            border-color: var(--yellow);
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.2);
        }

        .item-id { 
            font-family: 'Orbitron', monospace; 
            font-size: 11px; 
            font-weight: 900; 
            color: var(--bg); 
            background: linear-gradient(135deg, var(--yellow), #FFA500); 
            padding: 6px 10px; 
            border-radius: 6px; 
            min-width: 70px; 
            text-align: center;
            box-shadow: 0 4px 12px rgba(255, 215, 0, 0.4);
        }
        .item.box .item-id { background: linear-gradient(135deg, var(--green), #00CC66); }
        .item-info { flex: 1; min-width: 0; }
        .item-name { font-weight: 700; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-meta { font-size: 11px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-qty { 
            color: var(--yellow); 
            font-weight: 800; 
            font-size: 14px; 
            min-width: 55px; 
            text-align: right;
            font-family: 'Orbitron', monospace;
        }
        .item-qty.low { color: var(--red); }
        .item-qty.mid { color: #FFAA00; }
        
        .actions { 
            position: fixed; 
            bottom: 0; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 100%; 
            max-width: 600px; 
            background: linear-gradient(to top, rgba(10, 10, 10, 0.98), rgba(10, 10, 10, 0.95)); 
            border-top: 3px solid var(--yellow); 
            padding: 16px; 
            display: flex; 
            gap: 10px; 
            z-index: 50;
            backdrop-filter: blur(10px);
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.5);
        }
        .btn-main { 
            flex: 1; 
            padding: 16px 10px; 
            border-radius: 10px; 
            border: none; 
            font-weight: 800; 
            font-size: 12px; 
            cursor: pointer; 
            text-transform: uppercase; 
            font-family: 'Orbitron', monospace; 
            color: var(--bg); 
            transition: all 0.3s ease;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }
        .btn-main::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        .btn-main:active::before {
            width: 300px;
            height: 300px;
        }
        .btn-main:active { transform: scale(0.95); }
        .btn-scan { 
            background: linear-gradient(135deg, var(--yellow), #FFA500);
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.4);
        }
        .btn-scan:hover {
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.6);
            transform: translateY(-2px);
        }
        .btn-secondary { 
            flex: 0.5; 
            padding: 16px 10px; 
            border-radius: 10px; 
            border: 2px solid var(--text-dim); 
            background: rgba(30, 30, 30, 0.6); 
            color: var(--text-dim); 
            font-weight: 700; 
            font-size: 11px; 
            cursor: pointer; 
            text-transform: uppercase; 
            font-family: 'Orbitron', monospace;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }
        .btn-secondary:hover {
            border-color: var(--purple);
            color: var(--purple);
            transform: translateY(-2px);
        }
        .btn-delete { border-color: var(--red); color: var(--red); }
        .btn-delete:hover {
            border-color: var(--red);
            color: var(--red);
            background: rgba(255, 68, 68, 0.1);
        }
        
        .camera { 
            position: fixed; 
            inset: 0; 
            background: #000; 
            z-index: 400; 
            display: none;
        }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .shutter { 
            width: 80px; 
            height: 80px; 
            border: 5px solid var(--yellow); 
            background: var(--yellow-dim); 
            border-radius: 50%; 
            position: absolute; 
            bottom: 40px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 401; 
            cursor: pointer; 
            transition: all 0.2s ease;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.05); }
        }
        
        .shutter:active { transform: translateX(-50%) scale(0.9); }
        .shutter.delete { 
            border-color: var(--red); 
            background: rgba(255,68,68,0.2);
            box-shadow: 0 0 30px rgba(255, 68, 68, 0.5);
        }
        
        .processing { 
            position: absolute; 
            inset: 0; 
            background: rgba(0,0,0,0.95); 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            z-index: 500;
        }
        .spinner { 
            width: 60px; 
            height: 60px; 
            border: 5px solid #333; 
            border-top: 5px solid var(--yellow); 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .modal { 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.95); 
            z-index: 600; 
            display: none; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
            overflow-y: auto;
            backdrop-filter: blur(10px);
        }
        .modal-content { 
            background: linear-gradient(135deg, rgba(30, 30, 30, 0.95), rgba(20, 20, 20, 0.95)); 
            border: 3px solid var(--yellow); 
            border-radius: 12px; 
            padding: 28px; 
            width: 100%; 
            max-width: 420px; 
            max-height: 90vh; 
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(255, 215, 0, 0.3);
            animation: modalSlideIn 0.3s ease-out;
        }
        
        @keyframes modalSlideIn {
            from { transform: scale(0.9) translateY(20px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }
        
        .form-group { margin-bottom: 16px; }
        .form-label { 
            font-size: 11px; 
            color: var(--text-dim); 
            text-transform: uppercase; 
            margin-bottom: 6px; 
            display: block; 
            font-weight: 700;
            letter-spacing: 1px;
        }
        .form-input, .form-select { 
            width: 100%; 
            background: rgba(10, 10, 10, 0.8); 
            border: 2px solid var(--border); 
            border-radius: 8px; 
            padding: 12px; 
            color: var(--text); 
            outline: none; 
            font-family: 'Rajdhani', sans-serif; 
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .form-input:focus, .form-select:focus { 
            border-color: var(--yellow); 
            background: rgba(20, 20, 20, 0.9);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
        }
        
        .login-screen { 
            position: fixed; 
            inset: 0; 
            background: linear-gradient(135deg, #0a0a0a, #1a1a1a); 
            z-index: 800; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px;
        }
        .login-box { 
            background: linear-gradient(135deg, rgba(30, 30, 30, 0.95), rgba(20, 20, 20, 0.95)); 
            border: 3px solid var(--yellow); 
            border-radius: 12px;
            padding: 50px 40px; 
            width: 100%; 
            max-width: 380px; 
            text-align: center;
            box-shadow: 0 20px 60px rgba(255, 215, 0, 0.3);
            animation: modalSlideIn 0.5s ease-out;
        }
        
        .alert { 
            background: rgba(255,68,68,0.1); 
            border-left: 4px solid var(--red); 
            padding: 14px; 
            border-radius: 6px; 
            margin-bottom: 14px; 
            font-size: 13px;
            font-weight: 600;
        }
        .alert.success { background: rgba(0,255,136,0.1); border-left-color: var(--green); }
        
        .btn-group { display: flex; gap: 10px; }
        .btn-group .btn-main { flex: 1; }
        
        .stat-row { 
            display: flex; 
            justify-content: space-between; 
            padding: 14px 0; 
            border-bottom: 1px solid var(--border); 
            font-size: 13px;
            font-weight: 600;
        }
        .stat-row:last-child { border-bottom: none; }
        
        .empty-state { 
            text-align: center; 
            padding: 50px 20px; 
            color: var(--text-dim); 
            font-size: 13px;
            font-weight: 600;
        }

        /* Scan Result Modal - Simplified */
        .scan-result {
            padding: 20px;
            background: rgba(40, 40, 40, 0.8);
            border: 2px solid var(--yellow);
            border-radius: 10px;
            margin-bottom: 20px;
            animation: fadeInUp 0.4s ease-out;
        }
        .scan-result-title {
            font-family: 'Orbitron', monospace;
            font-size: 12px;
            color: var(--yellow);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }
        .scan-result-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }
        .scan-result-item:last-child {
            border-bottom: none;
        }
