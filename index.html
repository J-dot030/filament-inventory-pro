<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Filament Inventory</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0a; --surface: #141414; --surface-hover: #1f1f1f;
            --yellow: #FFD700; --yellow-dim: rgba(255, 215, 0, 0.2); --border: #333333;
            --text: #ffffff; --text-dim: #888888; --red: #FF4444; --green: #00FF88;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
        body::before { content: ''; position: fixed; inset: 0; background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1), rgba(0,0,0,0.1) 1px, transparent 1px, transparent 2px); pointer-events: none; z-index: 999; }
        .container { max-width: 600px; margin: 0 auto; padding-bottom: 120px; }
        header { background: var(--surface); border-bottom: 2px solid var(--yellow); padding: 16px 20px; position: sticky; top: 0; z-index: 100; }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .logo { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 800; color: var(--yellow); display: flex; align-items: center; gap: 8px; }
        .sync-status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--green); font-weight: 700; font-family: 'JetBrains Mono', monospace; }
        .sync-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .user-info { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-dim); }
        .stats { padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; border-left: 3px solid var(--yellow); }
        .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 28px; font-weight: 800; }
        .tabs { display: flex; padding: 0 20px; gap: 8px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; text-align: center; font-size: 12px; cursor: pointer; color: var(--text-dim); text-transform: uppercase; font-weight: 700; }
        .tab.active { background: var(--yellow-dim); color: var(--yellow); border-color: var(--yellow); }
        .search { padding: 0 20px; margin-bottom: 24px; }
        .search-input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 14px 16px; color: var(--text); outline: none; font-family: 'JetBrains Mono', monospace; }
        .inventory { padding: 0 20px; }
        .item { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 16px; display: flex; align-items: center; gap: 12px; margin-bottom: 8px; cursor: pointer; }
        .item-id { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 800; color: var(--bg); background: var(--yellow); padding: 4px 6px; border-radius: 4px; }
        .item-info { flex: 1; }
        .qty-val { font-family: 'JetBrains Mono', monospace; color: var(--yellow); font-weight: 800; }
        .actions { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 600px; background: var(--bg); border-top: 2px solid var(--yellow); padding: 16px 20px; display: flex; gap: 12px; z-index: 50; }
        .btn-main { flex: 2; padding: 16px; border-radius: 6px; border: none; background: var(--yellow); color: var(--bg); font-weight: 800; font-family: 'JetBrains Mono', monospace; cursor: pointer; }
        .btn-secondary { flex: 1; padding: 16px; border-radius: 6px; border: 1px solid var(--red); background: transparent; color: var(--red); font-weight: 700; font-family: 'JetBrains Mono', monospace; cursor: pointer; }
        .camera { position: fixed; inset: 0; background: #000; z-index: 400; display: none; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .shutter { width: 72px; height: 72px; border: 4px solid var(--yellow); background: var(--yellow-dim); border-radius: 50%; position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); }
        .processing { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 500; }
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid var(--yellow); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 600; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--surface); border: 2px solid var(--yellow); border-radius: 8px; padding: 24px; width: 100%; max-width: 400px; }
        .form-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 12px; color: var(--text); margin-bottom: 12px; outline: none; }
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--yellow); color: var(--bg); padding: 12px 24px; border-radius: 4px; font-weight: 800; font-size: 12px; z-index: 1000; display: none; }
        .login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 800; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-box { background: var(--surface); border: 2px solid var(--border); border-left: 4px solid var(--yellow); padding: 32px; width: 100%; max-width: 360px; text-align: center; }
    </style>
</head>
<body>

    <div class="login-screen" id="login-screen">
        <div class="login-box">
            <div style="font-family: 'JetBrains Mono', monospace; font-size: 22px; color: var(--yellow); margin-bottom: 20px; font-weight: 900;">🧵 FILAMENT INVENTORY</div>
            <input type="text" class="form-input" id="member-id" placeholder="Name (Benjamin/Christian/Rahul)" style="text-align: center;">
            <button class="btn-main" onclick="login()" style="width: 100%;">ACCESS_SYSTEM</button>
        </div>
    </div>

    <div class="container" id="main-app" style="display: none;">
        <header>
            <div class="header-row">
                <div class="logo"><span>🧵</span> Filament Inventory</div>
                <div class="sync-status"><div class="sync-dot"></div><span>SYNC_ACTIVE</span></div>
            </div>
            <div class="user-info">OP: <span id="user-name" style="color:var(--text); font-weight:700;">-</span> | <span onclick="logout()" style="color:var(--red); font-size:10px; cursor:pointer;">LOGOUT</span></div>
        </header>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="total">0</div>
                <div style="font-size:10px; color:var(--text-dim);">TOTAL ASSETS</div>
            </div>
            <div class="stat-card" style="border-left-color: var(--red);">
                <div class="stat-value" id="low-stock" style="color:var(--red);">0</div>
                <div style="font-size:10px; color:var(--text-dim);">EMPTY SPOOLS</div>
            </div>
        </div>

        <div class="tabs">
            <div class="tab active" id="tab-storage" onclick="setTab('storage')">Spools</div>
            <div class="tab" id="tab-inventory" onclick="setTab('inventory')">Boxes</div>
        </div>

        <div class="search"><input type="text" class="search-input" id="search" placeholder="> Search inventory..." onkeyup="renderInventory()"></div>
        <div class="inventory" id="inventory"></div>
    </div>

    <div class="actions" id="action-bar" style="display: none;">
        <button class="btn-secondary" onclick="openCamera('delete')">EMPTY SPOOL</button>
        <button class="btn-main" onclick="openCamera('scan')">SCAN</button>
    </div>

    <div class="camera" id="camera">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas" style="display:none;"></canvas>
        <button class="shutter" onclick="capture()"></button>
        <button onclick="closeCamera()" style="position:absolute; top:20px; right:20px; background:rgba(0,0,0,0.5); color:white; border:none; padding:10px; border-radius:4px; cursor:pointer;">✕</button>
        <div class="processing" id="processing">
            <div class="spinner"></div>
            <div style="color:var(--yellow); font-family:'JetBrains Mono'; font-weight:800;">ANALYZING...</div>
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <div style="color:var(--yellow); font-weight:800; margin-bottom:15px; font-family:'JetBrains Mono';">ASSET_DATA</div>
            <input type="text" id="f-id" class="form-input" readonly>
            <input type="text" id="f-brand" class="form-input" placeholder="Brand">
            <input type="text" id="f-material" class="form-input" placeholder="Material">
            <input type="text" id="f-color" class="form-input" placeholder="Color">
            <select id="f-qty" class="form-input">
                <option value="100">100% Full</option>
                <option value="50">50% Half</option>
                <option value="10">10% Low</option>
                <option value="0">Empty</option>
            </select>
            <select id="f-status" class="form-input">
                <option value="storage">Spool (Opened)</option>
                <option value="inventory">Box (Unopened)</option>
            </select>
            <button class="btn-main" style="width:100%;" onclick="saveItem()">COMMIT_TO_CLOUD</button>
            <button class="btn-secondary" onclick="document.getElementById('modal').style.display='none'" style="width:100%; margin-top:10px; border-color:#555; color:#888;">CANCEL</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCLlCKwujLGtQw9DEvHl-ZYW1Z0cK8Xw-E",
            authDomain: "inventory-86d26.firebaseapp.com",
            projectId: "inventory-86d26",
            storageBucket: "inventory-86d26.firebasestorage.app",
            messagingSenderId: "833068204777",
            appId: "1:833068204777:web:09b2c6cedde4cfb199a678",
            databaseURL: "https://inventory-86d26-default-rtdb.europe-west1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const inventoryRef = ref(db, 'inventory');

        // FIXED GEMINI API KEY
        const GEMINI_API_KEY = "AIzaSyDmLS6kfioDv548O6Qg-2sBA1YQQ_IMAlw";

        let inventoryArr = [];
        let activeUser = localStorage.getItem('activeUser');
        let currentTab = 'storage';
        let currentScanMode = 'scan';

        if(activeUser) { loginSuccess(activeUser); }

        window.login = function() {
            const nameInput = document.getElementById('member-id').value.trim().toLowerCase();
            const allowed = ["benjamin", "christian", "rahul"];
            if (allowed.includes(nameInput)) {
                activeUser = nameInput.charAt(0).toUpperCase() + nameInput.slice(1);
                localStorage.setItem('activeUser', activeUser);
                loginSuccess(activeUser);
            } else { showToast("ACCESS_DENIED", "error"); }
        };

        function loginSuccess(user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('action-bar').style.display = 'flex';
            document.getElementById('user-name').textContent = user;
            syncData();
        }

        window.logout = function() {
            localStorage.removeItem('activeUser');
            location.reload();
        };

        function syncData() {
            onValue(inventoryRef, (snapshot) => {
                const data = snapshot.val();
                inventoryArr = data ? Object.values(data) : [];
                renderInventory();
            });
        }

        window.renderInventory = function() {
            const container = document.getElementById('inventory');
            const search = document.getElementById('search').value.toLowerCase();
            container.innerHTML = '';
            
            const filtered = inventoryArr.filter(item => {
                const searchStr = (String(item.id) + String(item.brand) + String(item.color)).toLowerCase();
                return searchStr.includes(search) && item.status === currentTab;
            });

            filtered.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item';
                div.onclick = () => editExistingItem(item);
                div.innerHTML = `
                    <div class="item-id">${item.id}</div>
                    <div class="item-info">
                        <div style="font-weight:700;">${item.brand} ${item.type}</div>
                        <div style="font-size:11px; color:#888;">${item.color} • OP: ${item.user}</div>
                    </div>
                    <div class="qty-val">${item.qty}%</div>
                `;
                container.appendChild(div);
            });
            document.getElementById('total').textContent = inventoryArr.length;
            document.getElementById('low-stock').textContent = inventoryArr.filter(i => i.qty <= 0).length;
        };

        window.setTab = function(t) {
            currentTab = t;
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + t).classList.add('active');
            renderInventory();
        };

        window.saveItem = function() {
            const id = document.getElementById('f-id').value;
            const item = {
                id,
                brand: document.getElementById('f-brand').value,
                type: document.getElementById('f-material').value.toUpperCase(),
                color: document.getElementById('f-color').value,
                qty: parseInt(document.getElementById('f-qty').value),
                status: document.getElementById('f-status').value,
                user: activeUser,
                timestamp: Date.now()
            };
            set(ref(db, 'inventory/' + id), item);
            document.getElementById('modal').style.display = 'none';
            showToast("SYNC_COMPLETE");
        };

        function editExistingItem(item) {
            document.getElementById('f-id').value = item.id;
            document.getElementById('f-brand').value = item.brand;
            document.getElementById('f-material').value = item.type;
            document.getElementById('f-color').value = item.color;
            document.getElementById('f-qty').value = item.qty;
            document.getElementById('f-status').value = item.status;
            document.getElementById('modal').style.display = 'flex';
        }

        let stream;
        window.openCamera = async function(mode) {
            currentScanMode = mode;
            document.getElementById('camera').style.display = 'block';
            stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'environment', width: { ideal: 1920 } } 
            });
            document.getElementById('video').srcObject = stream;
        };

        window.closeCamera = function() {
            document.getElementById('camera').style.display = 'none';
            if(stream) stream.getTracks().forEach(t => t.stop());
        };

        window.capture = async function() {
            document.getElementById('processing').style.display = 'flex';
            const vid = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            canvas.width = vid.videoWidth; canvas.height = vid.videoHeight;
            canvas.getContext('2d').drawImage(vid, 0, 0);
            const base64 = canvas.toDataURL('image/jpeg', 0.95).split(',')[1];
            
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Analyze label. DOT MATRIX FONT: Slashed zero is 0. Extrudr ID is 13 chars (3 nums, M, 9 nums). Return JSON: {brand, color, type, asset_id, status:'inventory' or 'storage'}" }, { inlineData: { mimeType: 'image/jpeg', data: base64 } }] }]
                    })
                });
                const data = await res.json();
                let raw = data.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim();
                const result = JSON.parse(raw);

                if(result.asset_id) {
                    let cleanId = result.asset_id.toUpperCase().replace(/[OQ]/g, '0');
                    if (cleanId.startsWith('888M')) cleanId = '000M' + cleanId.substring(4);
                    if (cleanId.startsWith('846M')) cleanId = '046M' + cleanId.substring(4);
                    result.asset_id = cleanId;
                }

                if(currentScanMode === 'delete') {
                    if(result.asset_id) await remove(ref(db, 'inventory/' + result.asset_id));
                    showToast("PURGED");
                    closeCamera();
                } else {
                    document.getElementById('f-id').value = result.asset_id || "UNKNOWN";
                    document.getElementById('f-brand').value = result.brand || "";
                    document.getElementById('f-material').value = result.type || "";
                    document.getElementById('f-color').value = result.color || "";
                    document.getElementById('f-status').value = result.status || "storage";
                    document.getElementById('modal').style.display = 'flex';
                    closeCamera();
                }
            } catch (e) { alert("Scan failed. Try holding steadier."); }
            document.getElementById('processing').style.display = 'none';
        };

        window.showToast = (m, type) => {
            const t = document.getElementById('toast');
            t.textContent = m;
            t.style.background = type === 'error' ? 'var(--red)' : 'var(--yellow)';
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        };
    </script>
</body>
</html>
