<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpoolVault — Filament Inventory System</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --surface-hover: #1f1f1f;
            --yellow: #FFD700;
            --yellow-dim: rgba(255, 215, 0, 0.2);
            --border: #333333;
            --text: #ffffff;
            --text-dim: #888888;
            --red: #FF4444;
            --green: #00FF88;
            --blue: #4A9EFF;
            --purple: #9D4EDD;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15), rgba(0,0,0,0.15) 1px, transparent 1px, transparent 2px);
            pointer-events: none; z-index: 999;
        }
        .container { max-width: 600px; margin: 0 auto; position: relative; padding-bottom: 120px; }
        header { background: var(--surface); border-bottom: 2px solid var(--yellow); padding: 16px 20px; position: sticky; top: 0; z-index: 100; }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .logo-container { display: flex; align-items: center; gap: 12px; }
        .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--yellow) 0%, #FFA500 100%); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
        .logo-text { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 800; color: var(--yellow); }
        .sync-status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--green); font-family: 'JetBrains Mono', monospace; }
        .sync-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.8); } }
        .stats { padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; border-left: 3px solid var(--yellow); }
        .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 28px; font-weight: 800; }
        .tabs { display: flex; padding: 0 20px; gap: 8px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; text-align: center; cursor: pointer; color: var(--text-dim); font-size: 12px; font-weight: 700; text-transform: uppercase; }
        .tab.active { background: var(--yellow-dim); color: var(--yellow); border-color: var(--yellow); }
        .search { padding: 0 20px; margin-bottom: 24px; }
        .search-input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 14px; color: var(--text); font-family: 'JetBrains Mono', monospace; outline: none; }
        .category-grid { padding: 0 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
        .category-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; cursor: pointer; position: relative; }
        .category-type { font-family: 'JetBrains Mono', monospace; color: var(--yellow); font-weight: 800; }
        .actions { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 600px; background: var(--bg); border-top: 2px solid var(--yellow); padding: 16px 20px; display: flex; gap: 10px; z-index: 50; }
        .btn-main { flex: 2; padding: 14px; background: var(--yellow); color: var(--bg); border: none; border-radius: 6px; font-weight: 800; font-family: 'JetBrains Mono', monospace; cursor: pointer; }
        .btn-secondary { flex: 1; padding: 14px; background: transparent; color: var(--text-dim); border: 1px solid var(--border); border-radius: 6px; font-weight: 700; cursor: pointer; }
        .camera { position: fixed; inset: 0; background: #000; z-index: 400; display: none; flex-direction: column; }
        .camera.active { display: flex; }
        #video { flex: 1; object-fit: cover; }
        .shutter { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); width: 72px; height: 72px; border: 4px solid var(--yellow); background: var(--yellow-dim); border-radius: 50%; cursor: pointer; }
        .processing { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; flex-direction: column; z-index: 500; }
        .processing.active { display: flex; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 600; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal.open { display: flex; }
        .modal-content { background: var(--surface); border: 2px solid var(--yellow); padding: 24px; border-radius: 8px; width: 100%; max-width: 400px; }
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--yellow); color: var(--bg); padding: 12px 24px; border-radius: 4px; font-weight: 800; display: none; z-index: 999; }
        .login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-screen.hidden { display: none; }
    </style>
</head>
<body>

<div class="login-screen" id="login-screen">
    <div style="background: var(--surface); padding: 40px; border-radius: 8px; border-left: 4px solid var(--yellow); width: 320px; text-align: center;">
        <h2 style="color: var(--yellow); font-family: 'JetBrains Mono', monospace; margin-bottom: 20px;">SpoolVault</h2>
        <input type="text" id="member-id" placeholder="Access Name" style="width: 100%; padding: 12px; margin-bottom: 16px; background: var(--bg); border: 1px solid var(--border); color: white;">
        <button class="btn-main" onclick="login()" style="width: 100%;">SIGN IN</button>
    </div>
</div>

<div class="container" id="main-app" style="display: none;">
    <header>
        <div class="header-row">
            <div class="logo-container">
                <div class="logo-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#0a0a0a" stroke-width="2.5"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3" fill="#0a0a0a"/></svg></div>
                <div class="logo-text">SpoolVault</div>
            </div>
            <div class="sync-status"><div class="sync-dot"></div><span>LIVE</span></div>
        </div>
    </header>

    <div class="stats">
        <div class="stat-card">
            <div style="font-size: 10px; color: var(--text-dim);">TOTAL ASSETS</div>
            <div class="stat-value" id="total">0</div>
        </div>
        <div class="stat-card">
            <div style="font-size: 10px; color: var(--text-dim);">EMPTY SPOOLS</div>
            <div class="stat-value" id="low-stock" style="color: var(--red);">0</div>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active" id="tab-storage" onclick="setTab('storage')">Opened</div>
        <div class="tab" id="tab-inventory" onclick="setTab('inventory')">Unopened</div>
    </div>

    <div class="search">
        <input type="text" class="search-input" id="search" placeholder="> search..." onkeyup="renderInventory()">
    </div>

    <div id="categories" class="category-grid"></div>
</div>

<div class="actions" id="action-bar" style="display: none;">
    <button class="btn-main" onclick="openCamera('scan')">SCAN LABEL</button>
    <button class="btn-secondary" onclick="logout()">LOGOUT</button>
</div>

<div class="camera" id="camera">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas" style="display:none;"></canvas>
    <div class="shutter" onclick="capture()"></div>
    <button onclick="closeCamera()" style="position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.5); color: white; border: 1px solid var(--yellow); padding: 8px 16px; border-radius: 4px;">CLOSE</button>
</div>

<div class="processing" id="processing">
    <div style="width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid var(--yellow); border-radius: 50%; animation: spin 1s linear infinite;"></div>
    <div style="margin-top: 16px; color: var(--yellow); font-family: 'JetBrains Mono', monospace;" id="process-text">ANALYZING...</div>
</div>

<div class="modal" id="modal">
    <div class="modal-content">
        <h3 id="modal-title" style="color: var(--yellow); margin-bottom: 20px;">ASSET DATA</h3>
        <input type="hidden" id="f-id">
        <div style="margin-bottom: 12px;">
            <label style="font-size: 10px; color: var(--text-dim);">BRAND</label>
            <input type="text" id="f-brand" style="width:100%; padding:10px; background:#000; border:1px solid #333; color:white;">
        </div>
        <div style="margin-bottom: 12px;">
            <label style="font-size: 10px; color: var(--text-dim);">MATERIAL</label>
            <input type="text" id="f-material" style="width:100%; padding:10px; background:#000; border:1px solid #333; color:white;">
        </div>
        <div style="margin-bottom: 12px;">
            <label style="font-size: 10px; color: var(--text-dim);">COLOR</label>
            <input type="text" id="f-color" style="width:100%; padding:10px; background:#000; border:1px solid #333; color:white;">
        </div>
        <div style="margin-bottom: 20px;">
            <label style="font-size: 10px; color: var(--text-dim);">STATUS</label>
            <select id="f-status" style="width:100%; padding:10px; background:#000; border:1px solid #333; color:white;">
                <option value="storage">Opened Spool</option>
                <option value="inventory">Unopened Box</option>
            </select>
        </div>
        <button class="btn-main" onclick="saveItem()" style="width: 100%;">SAVE TO DATABASE</button>
        <button onclick="closeModal()" style="width: 100%; background: none; border: none; color: var(--text-dim); margin-top: 12px; cursor: pointer;">CANCEL</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCLlCKwujLGtQw9DEvHl-ZYW1Z0cK8Xw-E",
        authDomain: "inventory-86d26.firebaseapp.com",
        projectId: "inventory-86d26",
        storageBucket: "inventory-86d26.firebasestorage.app",
        messagingSenderId: "833068204777",
        appId: "1:833068204777:web:09b2c6cedde4cfb199a678",
        databaseURL: "https://inventory-86d26-default-rtdb.europe-west1.firebasedatabase.app"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let inventory = [];
    let activeUser = localStorage.getItem('activeUser');
    let currentTab = 'storage';
    let stream = null;

    // Your integrated API Key
    const GROQ_KEY = "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";

    function login() {
        const id = document.getElementById('member-id').value.trim().toLowerCase();
        if(["benjamin", "christian", "rahul"].includes(id)) {
            activeUser = id;
            localStorage.setItem('activeUser', id);
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('action-bar').style.display = 'flex';
            syncData();
        } else {
            showToast("ACCESS DENIED");
        }
    }

    function logout() {
        localStorage.removeItem('activeUser');
        location.reload();
    }

    function syncData() {
        db.ref('inventory').on('value', (snap) => {
            const data = snap.val();
            inventory = data ? Object.values(data) : [];
            renderInventory();
            updateStats();
        });
    }

    function updateStats() {
        document.getElementById('total').textContent = inventory.length;
        document.getElementById('low-stock').textContent = inventory.filter(i => i.qty === 0).length;
    }

    function setTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.add('active');
        renderInventory();
    }

    function renderInventory() {
        const container = document.getElementById('categories');
        const search = document.getElementById('search').value.toLowerCase();
        container.innerHTML = '';

        let filtered = inventory.filter(i => i.status === currentTab);
        if(search) {
            filtered = filtered.filter(i => 
                i.brand.toLowerCase().includes(search) || 
                i.color.toLowerCase().includes(search) || 
                i.type.toLowerCase().includes(search)
            );
        }

        filtered.forEach(item => {
            container.innerHTML += `
                <div class="category-card" onclick="editItem('${item.id}')">
                    <div class="category-type">${item.type}</div>
                    <div style="font-size: 12px;">${item.brand}</div>
                    <div style="font-size: 11px; color: var(--text-dim);">${item.color}</div>
                </div>
            `;
        });
    }

    async function openCamera() {
        document.getElementById('camera').classList.add('active');
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        document.getElementById('video').srcObject = stream;
    }

    function closeCamera() {
        document.getElementById('camera').classList.remove('active');
        if(stream) stream.getTracks().forEach(t => t.stop());
    }

    async function capture() {
        document.getElementById('processing').classList.add('active');
        const vid = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        
        // Scale to maintain payload size
        const scale = Math.min(1, 1024 / vid.videoWidth);
        canvas.width = vid.videoWidth * scale;
        canvas.height = vid.videoHeight * scale;
        canvas.getContext('2d').drawImage(vid, 0, 0, canvas.width, canvas.height);
        const base64 = canvas.toDataURL('image/jpeg', 0.8);

        try {
            const prompt = "Analyze filament label. Return JSON: {\"type\":\"spool/box\",\"brand\":\"NAME\",\"material\":\"TYPE\",\"color\":\"COLOR\",\"id\":\"SERIAL\"}";
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${GROQ_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: "meta-llama/llama-4-scout-17b-16e-instruct", // Scout model as per documentation
                    messages: [{ role: "user", content: [{ type: "text", text: prompt }, { type: "image_url", image_url: { url: base64 } }] }],
                    temperature: 0.1,
                    response_format: { "type": "json_object" } //
                })
            });

            const data = await res.json();
            const result = JSON.parse(data.choices[0].message.content);
            
            document.getElementById('f-id').value = result.id || Date.now();
            document.getElementById('f-brand').value = result.brand || "";
            document.getElementById('f-material').value = result.material || "";
            document.getElementById('f-color').value = result.color || "";
            document.getElementById('f-status').value = result.type === 'box' ? 'inventory' : 'storage';
            
            closeCamera();
            document.getElementById('processing').classList.remove('active');
            document.getElementById('modal').classList.add('open');
        } catch (e) {
            showToast("SCAN FAILED");
            document.getElementById('processing').classList.remove('active');
        }
    }

    function saveItem() {
        const id = document.getElementById('f-id').value;
        db.ref('inventory/' + id).set({
            id: id,
            brand: document.getElementById('f-brand').value,
            type: document.getElementById('f-material').value,
            color: document.getElementById('f-color').value,
            status: document.getElementById('f-status').value,
            timestamp: Date.now()
        });
        closeModal();
    }

    function editItem(id) {
        const item = inventory.find(i => i.id == id);
        document.getElementById('f-id').value = item.id;
        document.getElementById('f-brand').value = item.brand;
        document.getElementById('f-material').value = item.type;
        document.getElementById('f-color').value = item.color;
        document.getElementById('f-status').value = item.status;
        document.getElementById('modal').classList.add('open');
    }

    function closeModal() { document.getElementById('modal').classList.remove('open'); }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    if(activeUser) {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-app').style.display = 'block';
        document.getElementById('action-bar').style.display = 'flex';
        syncData();
    }
</script>

<style> @keyframes spin { to { transform: rotate(360deg); } } </style>
</body>
</html>
