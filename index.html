                    console.error('Groq API Error:', errorData);
                    throw new Error(`HTTP ${res.status}: ${JSON.stringify(errorData)}`);
                }

                const data = await res.json();
                
                // ✅ IMPROVED: Robust JSON extraction from response
                let result;
                const content = data.choices[0].message.content;
                
                // Try direct JSON parsing first
                try {
                    result = JSON.parse(content);
                } catch (e) {
                    // Fallback: Extract JSON from markdown code blocks
                    const jsonMatch = content.match(/```(?:json)?\s*([\s\S]*?)\s*```/);
                    if (jsonMatch) {
                        result = JSON.parse(jsonMatch[1]);
                    } else {
                        // Last resort: Find JSON object pattern
                        const jsonStart = content.indexOf('{');
                        const jsonEnd = content.lastIndexOf('}');
                        if (jsonStart !== -1 && jsonEnd !== -1) {
                            result = JSON.parse(content.substring(jsonStart, jsonEnd + 1));
                        } else {
                            throw new Error('Could not parse JSON from response');
                        }
                    }
                }

                let finalId = result.asset_id ? String(result.asset_id).toUpperCase().replace(/[\s\-\.]/g, '') : null;

                // --- THE JAVASCRIPT SAFETY NET (Enhanced) ---
                if (currentScanMode !== 'box') {
                    // Fallback 1: Scan every raw text line for the 'M' format
                    if (result.raw_text_lines && Array.isArray(result.raw_text_lines)) {
                        for (let line of result.raw_text_lines) {
                            let cleanLine = line.toUpperCase().replace(/[\s\-\.]/g, ''); 
                            if (cleanLine.length >= 12 && cleanLine.length <= 14 && cleanLine.includes('M')) {
                                let mIndex = cleanLine.indexOf('M');
                                if (mIndex >= 2 && mIndex <= 4) { 
                                    finalId = cleanLine; 
                                    console.log('✅ Found in raw_text_lines:', cleanLine);
                                    break; 
                                }
                            }
                        }
                    }

                    // Fallback 2: Fix common dot-matrix OCR errors
                    if (finalId) {
                        const originalId = finalId;
                        
                        // Fix classic OCR misreads
                        finalId = finalId.replace(/[OQD]/g, '0');      // O,Q,D → 0
                        finalId = finalId.replace(/[IL]/g, '1');       // I,L → 1
                        finalId = finalId.replace(/[S]/g, '5');        // S → 5
                        finalId = finalId.replace(/[Z]/g, '2');        // Z → 2
                        
                        // Fix leading digit misreads (very common in dot matrix)
                        if (finalId.startsWith('888M')) finalId = '000M' + finalId.substring(4);
                        if (finalId.startsWith('846M')) finalId = '046M' + finalId.substring(4);
                        if (finalId.startsWith('800M')) finalId = '000M' + finalId.substring(4);
                        if (finalId.startsWith('8M')) finalId = '0M' + finalId.substring(2);

                        // Ensure exactly 13 characters with M at position 3
                        let mIndex = finalId.indexOf('M');
                        if (mIndex !== -1 && finalId.length > 13) {
                            let start = Math.max(0, mIndex - 3);
                            finalId = finalId.substring(start, start + 13);
                        }

                        if (originalId !== finalId) {
                            console.log('🔧 Auto-corrected:', originalId, '→', finalId);
                        }
                    }
                }

                if (!finalId || finalId === '' || finalId === 'NULL') {
                    alert('⚠️ SCAN REJECTED\n\nCould not read the tag cleanly. Please hold closer and ensure good lighting.');
                    shutterBtn.disabled = false;
                    document.getElementById('processing').style.display = 'none';
                    return;
                }

                const cleanExtractedId = finalId;
                console.log('📦 Final ID:', cleanExtractedId);

                // Delete Mode
                if(currentScanMode === 'delete') {
                    if(inventoryArr.find(i => String(i.id).trim().toUpperCase() === cleanExtractedId)) {
                        await db.ref('inventory/' + cleanExtractedId).remove();
                        alert("ASSET PURGED");
                    } else {
                        alert("ERROR: ID NOT FOUND");
                    }
                    closeCamera();
                    return;
                }

                // Duplicate Prevention Mode
                const existingItem = inventoryArr.find(i => String(i.id).trim().toUpperCase() === cleanExtractedId);
                if (existingItem) {
                    alert(`⚠️ DUPLICATE DETECTED\n\nAsset ID: ${cleanExtractedId} is already in the database. Opening record...`);
                    // Open edit modal with existing data
                    document.getElementById('f-id').value = existingItem.id;
                    document.getElementById('f-brand').value = existingItem.brand || "";
                    document.getElementById('f-material').value = existingItem.type || "";
                    document.getElementById('f-color').value = existingItem.color || "";
                    document.getElementById('f-qty').value = existingItem.qty || 100;
                    document.getElementById('f-status').value = existingItem.status || "storage";
                    document.getElementById('modal').style.display = 'flex';
                    closeCamera();
                    return; 
                }

                // Normal Mode: Pre-fill modal with extracted data
                document.getElementById('f-id').value = cleanExtractedId;
                document.getElementById('f-brand').value = result.brand || "";
                document.getElementById('f-material').value = result.type || "";
                document.getElementById('f-color').value = result.color || "";
                document.getElementById('f-qty').value = 100;
                document.getElementById('f-status').value = assignedStatus;
                document.getElementById('modal').style.display = 'flex';
                
                closeCamera();
                
            } catch (e) { 
                console.error('Full error:', e);
                alert(`⚠️ API ERROR: ${e.message}\n\nMake sure:\n1. Groq key is valid\n2. Image is clear\n3. You're connected to internet`); 
                shutterBtn.disabled = false;
                document.getElementById('processing').style.display = 'none';
            }
        }
    </script>
</body>
