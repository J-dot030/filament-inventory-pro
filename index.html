<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Filament Inventory Pro</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #FFD700;
            --primary-light: rgba(255, 215, 0, 0.1);
            --primary-dark: #E6C200;
            --bg: #FFFFFF;
            --surface: #F5F5F5;
            --surface-dark: #EFEFEF;
            --border: #E0E0E0;
            --text: #1A1A1A;
            --text-light: #666666;
            --text-lighter: #999999;
            --red: #E53935;
            --green: #43A047;
            --blue: #1976D2;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.12);
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        
        /* Header */
        header {
            background: var(--bg);
            border-bottom: 2px solid var(--primary);
            padding: 16px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }
        
        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 22px;
            font-weight: 800;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 1px;
        }
        
        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-light);
        }
        
        .status-indicator {
            width: 8px;
            height: 8px;
            background: var(--green);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .header-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-light);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .header-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-light);
        }
        
        /* Main Container */
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }
        
        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }
        
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            border-left: 4px solid var(--primary);
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }
        
        .stat-label {
            font-size: 12px;
            color: var(--text-lighter);
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        
        .stat-value {
            font-family: 'Space Mono', monospace;
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
        }
        
        /* Content Area */
        .content-wrapper {
            background: var(--bg);
            border-radius: 12px;
        }
        
        /* Tabs */
        .tabs {
            display: flex;
            border-bottom: 2px solid var(--border);
            gap: 0;
            padding: 0 20px;
        }
        
        .tab {
            padding: 16px 24px;
            border-bottom: 3px solid transparent;
            background: transparent;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-light);
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .tab:hover {
            color: var(--text);
            border-bottom-color: var(--primary-light);
        }
        
        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }
        
        /* Search */
        .search-container {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }
        
        .search-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.2s ease;
        }
        
        .search-input:focus {
            border-color: var(--primary);
            background: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.1);
        }
        
        /* Inventory */
        .inventory-container {
            padding: 20px;
        }
        
        .inventory-group {
            margin-bottom: 24px;
        }
        
        .group-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 2px solid var(--border);
            margin-bottom: 12px;
            cursor: pointer;
            user-select: none;
        }
        
        .group-title {
            font-weight: 700;
            color: var(--primary);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .group-count {
            background: var(--primary-light);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }
        
        .group-items {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }
        
        .item-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .item-card:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow-lg);
            transform: translateY(-4px);
        }
        
        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        
        .item-id {
            font-family: 'Space Mono', monospace;
            font-size: 13px;
            font-weight: 700;
            background: var(--primary);
            color: var(--bg);
            padding: 4px 8px;
            border-radius: 6px;
            flex-shrink: 0;
        }
        
        .item-badge {
            font-size: 11px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 4px;
            background: var(--primary-light);
            color: var(--primary);
        }
        
        .item-info {
            margin-bottom: 12px;
        }
        
        .item-brand {
            font-weight: 700;
            color: var(--text);
            font-size: 15px;
            margin-bottom: 4px;
        }
        
        .item-meta {
            font-size: 13px;
            color: var(--text-light);
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .meta-tag {
            background: var(--surface-dark);
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
        }
        
        .stock-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }
        
        .stock-label {
            font-size: 12px;
            color: var(--text-lighter);
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        .stock-value {
            font-family: 'Space Mono', monospace;
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
        }
        
        .stock-value.low {
            color: var(--red);
        }
        
        .stock-value.mid {
            color: #FF9800;
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-lighter);
        }
        
        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .empty-text {
            font-size: 14px;
            color: var(--text-light);
        }
        
        /* Sidebar */
        .sidebar {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 50;
        }
        
        .action-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-lg);
            position: relative;
            overflow: hidden;
        }
        
        .action-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .action-btn:hover::before {
            opacity: 1;
        }
        
        .action-btn:active {
            transform: scale(0.9);
        }
        
        .btn-scan {
            background: var(--primary);
            color: var(--bg);
            font-weight: 800;
            font-size: 28px;
        }
        
        .btn-scan:hover {
            background: var(--primary-dark);
            box-shadow: 0 8px 20px rgba(255, 215, 0, 0.3);
            transform: scale(1.1);
        }
        
        .btn-edit {
            background: var(--blue);
            color: white;
            width: 52px;
            height: 52px;
            font-size: 20px;
        }
        
        .btn-edit:hover {
            background: #1565C0;
            box-shadow: 0 8px 20px rgba(25, 118, 210, 0.3);
            transform: scale(1.08);
        }
        
        .btn-delete {
            background: var(--red);
            color: white;
            width: 52px;
            height: 52px;
            font-size: 20px;
        }
        
        .btn-delete:hover {
            background: #C62828;
            box-shadow: 0 8px 20px rgba(229, 57, 53, 0.3);
            transform: scale(1.08);
        }
        
        .btn-manual {
            background: #9C27B0;
            color: white;
            width: 52px;
            height: 52px;
            font-size: 20px;
        }
        
        .btn-manual:hover {
            background: #7B1FA2;
            box-shadow: 0 8px 20px rgba(156, 39, 176, 0.3);
            transform: scale(1.08);
        }
        
        .action-tooltip {
            position: absolute;
            right: 70px;
            background: var(--text);
            color: var(--bg);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            box-shadow: var(--shadow-lg);
        }
        
        .action-btn:hover .action-tooltip {
            opacity: 1;
        }
        
        /* Camera */
        .camera {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 400;
            display: none;
            flex-direction: column;
        }
        
        .camera.active {
            display: flex;
        }
        
        .camera-header {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.5);
            z-index: 10;
        }
        
        .camera-label {
            color: var(--primary);
            font-weight: 700;
            font-size: 14px;
            font-family: 'Space Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .camera-close {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            width: 40px;
            height: 40px;
            border-radius: 8px;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .camera-close:hover {
            background: var(--primary);
            color: var(--bg);
        }
        
        #video {
            flex: 1;
            object-fit: cover;
        }
        
        .camera-footer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            text-align: center;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            z-index: 10;
        }
        
        .camera-instruction {
            color: var(--primary);
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            margin-bottom: 16px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .shutter {
            width: 72px;
            height: 72px;
            border: 4px solid var(--primary);
            background: transparent;
            border-radius: 50%;
            cursor: pointer;
            margin: 0 auto;
            transition: all 0.2s ease;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }
        
        .shutter:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.6);
        }
        
        .shutter:active {
            transform: scale(0.95);
        }
        
        .shutter.delete {
            border-color: var(--red);
            box-shadow: 0 0 20px rgba(229, 57, 53, 0.4);
        }
        
        .shutter.edit {
            border-color: var(--blue);
            box-shadow: 0 0 20px rgba(25, 118, 210, 0.4);
        }
        
        #canvas {
            display: none;
        }
        
        .processing {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }
        
        .processing.active {
            display: flex;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 215, 0, 0.2);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .processing-text {
            color: var(--primary);
            font-family: 'Space Mono', monospace;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .processing-log {
            color: var(--text-lighter);
            font-size: 12px;
            font-family: 'Space Mono', monospace;
        }
        
        /* Modal */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 450;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(4px);
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: var(--bg);
            border: 2px solid var(--primary);
            border-radius: 12px;
            padding: 28px;
            width: 100%;
            max-width: 500px;
            box-shadow: var(--shadow-lg);
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 16px;
        }
        
        .modal-title {
            font-size: 18px;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .modal-close {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-light);
            width: 32px;
            height: 32px;
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .modal-close:hover {
            border-color: var(--red);
            color: var(--red);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-lighter);
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        
        .form-input, .form-select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.2s ease;
        }
        
        .form-input:focus, .form-select:focus {
            border-color: var(--primary);
            background: var(--primary-light);
        }
        
        .form-input[readonly] {
            background: var(--surface);
            color: var(--primary);
            font-family: 'Space Mono', monospace;
            font-weight: 700;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: var(--bg);
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 8px;
        }
        
        .btn-primary:hover {
            background: var(--primary-dark);
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary);
            color: var(--bg);
            padding: 14px 24px;
            border-radius: 8px;
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            font-size: 12px;
            z-index: 600;
            display: none;
            box-shadow: var(--shadow-lg);
            text-transform: uppercase;
            letter-spacing: 1px;
            animation: slideDown 0.3s ease;
        }
        
        .toast.active {
            display: block;
        }
        
        .toast.error {
            background: var(--red);
        }
        
        .toast.success {
            background: var(--green);
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        
        /* Login */
        .login-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, var(--surface) 0%, var(--bg) 100%);
            z-index: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-screen.hidden {
            display: none;
        }
        
        .login-box {
            background: var(--bg);
            border: 2px solid var(--border);
            border-left: 4px solid var(--primary);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 380px;
            box-shadow: var(--shadow-lg);
        }
        
        .login-logo {
            font-size: 28px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 32px;
            letter-spacing: 1px;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-wrap: wrap;
                gap: 16px;
            }
            
            .sidebar {
                bottom: 20px;
                right: 20px;
            }
            
            .group-items {
                grid-template-columns: 1fr;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <!-- Login Screen -->
    <div class="login-screen" id="login-screen">
        <div class="login-box">
            <div class="login-logo">🧵 Filament Pro</div>
            <div class="form-group">
                <label class="form-label">Operator ID</label>
                <input type="text" class="form-input" id="member-id" placeholder="Enter your ID...">
            </div>
            <button class="btn-primary" onclick="login()">Login</button>
        </div>
    </div>

    <!-- Main App -->
    <div id="main-app" style="display: none;">
        <!-- Header -->
        <header>
            <div class="header-content">
                <div class="logo">🧵 FILAMENT PRO</div>
                <div class="header-actions">
                    <div class="user-info">
                        <div class="status-indicator"></div>
                        <span id="user-name">User</span>
                    </div>
                    <button class="header-btn" onclick="setApiKey()">API Key</button>
                    <button class="header-btn" onclick="logout()">Logout</button>
                </div>
            </div>
        </header>

        <!-- Main Container -->
        <div class="main-container">
            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Total Items</div>
                    <div class="stat-value" id="total">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Low Stock</div>
                    <div class="stat-value" id="low-stock">0</div>
                </div>
            </div>

            <!-- Content -->
            <div class="content-wrapper">
                <div class="tabs">
                    <button class="tab active" id="tab-spools" onclick="setTab('storage')">SPOOLS (STORAGE)</button>
                    <button class="tab" id="tab-boxes" onclick="setTab('inventory')">BOXES (INVENTORY)</button>
                </div>

                <div class="search-container">
                    <input type="text" class="search-input" id="search" placeholder="Search by material, color, brand..." onkeyup="renderInventory()">
                </div>

                <div class="inventory-container" id="inventory"></div>
            </div>
        </div>
    </div>

    <!-- Sidebar Actions -->
    <div class="sidebar">
        <button class="action-btn btn-scan" onclick="openCamera('scan')" title="Scan New">
            🔍
            <div class="action-tooltip">Scan New Item</div>
        </button>
        <button class="action-btn btn-edit" onclick="openCamera('edit')" title="Edit">
            ✎
            <div class="action-tooltip">Edit Item</div>
        </button>
        <button class="action-btn btn-delete" onclick="openCamera('delete')" title="Delete">
            🗑️
            <div class="action-tooltip">Delete Item</div>
        </button>
        <button class="action-btn btn-manual" onclick="openManualEntry()" title="Manual">
            ➕
            <div class="action-tooltip">Manual Entry</div>
        </button>
    </div>

    <!-- Camera -->
    <div class="camera" id="camera">
        <div class="camera-header">
            <div class="camera-label" id="cam-label">SCANNER ACTIVE</div>
            <button class="camera-close" onclick="closeCamera()">✕</button>
        </div>
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
        <div class="camera-footer">
            <div class="camera-instruction" id="cam-instruction">Position barcode/serial in frame</div>
            <button class="shutter" id="shutter" onclick="capture()"></button>
        </div>
        <div class="processing" id="processing">
            <div class="spinner"></div>
            <div class="processing-text" id="proc-text">SCANNING</div>
            <div class="processing-log" id="proc-log">Analyzing image...</div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="modal-title">Asset Data</div>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>

            <div class="form-group">
                <label class="form-label">Item Type</label>
                <select id="f-status" class="form-select">
                    <option value="storage">Storage (Opened Spool)</option>
                    <option value="inventory">Inventory (Unopened Box)</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Asset ID / Serial</label>
                <input type="text" id="f-id" class="form-input" readonly>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Brand</label>
                    <input type="text" id="f-brand" class="form-input" placeholder="e.g., Prusament">
                </div>
                <div class="form-group">
                    <label class="form-label">Material</label>
                    <input type="text" id="f-material" class="form-input" placeholder="PLA, PETG, ABS...">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Color</label>
                    <input type="text" id="f-color" class="form-input" placeholder="e.g., Black">
                </div>
                <div class="form-group">
                    <label class="form-label">Stock Level</label>
                    <select id="f-qty" class="form-select">
                        <option value="100">100% - Full</option>
                        <option value="90">90%</option>
                        <option value="80">80%</option>
                        <option value="70">70%</option>
                        <option value="60">60%</option>
                        <option value="50">50% - Half</option>
                        <option value="40">40%</option>
                        <option value="30">30%</option>
                        <option value="20">20%</option>
                        <option value="10">10%</option>
                        <option value="0">0% - Empty</option>
                    </select>
                </div>
            </div>

            <button class="btn-primary" onclick="saveItem()">Save Item</button>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // ===== STATE MANAGEMENT =====
        let inventory = JSON.parse(localStorage.getItem('filamentDB')) || [];
        let activeUser = localStorage.getItem('activeUser');
        let currentTab = 'storage';
        let currentScanMode = 'scan';
        let currentScanData = null;
        let editingItemId = null;
        let stream = null;

        if (activeUser) {
            initApp();
        }

        // ===== AUTHENTICATION =====
        function login() {
            const id = document.getElementById('member-id').value.trim();
            if (!id) return showToast('ID is required', 'error');
            activeUser = id;
            localStorage.setItem('activeUser', id);
            initApp();
        }

        function initApp() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('user-name').textContent = activeUser;
            renderInventory();
            updateStats();
        }

        function logout() {
            localStorage.removeItem('activeUser');
            location.reload();
        }

        // ===== API KEY =====
        function setApiKey() {
            const key = prompt('Enter Gemini API Key (get from console.cloud.google.com):');
            if (key) {
                localStorage.setItem('geminiApiKey', key);
                showToast('API Key saved successfully', 'success');
            }
        }

        // ===== RENDER INVENTORY =====
        function renderInventory() {
            const container = document.getElementById('inventory');
            const search = document.getElementById('search').value.toLowerCase();
            let filtered = inventory.filter(item => item.status === currentTab);

            if (search) {
                filtered = filtered.filter(item =>
                    (item.material || '').toLowerCase().includes(search) ||
                    (item.color || '').toLowerCase().includes(search) ||
                    (item.brand || '').toLowerCase().includes(search) ||
                    item.id.toLowerCase().includes(search)
                );
            }

            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-icon">📦</div><div class="empty-text">No items found</div></div>';
                return;
            }

            const grouped = groupByMaterialColor(filtered);
            container.innerHTML = '';

            Object.entries(grouped).forEach(([key, items]) => {
                const [material, color] = key.split('|');
                const groupDiv = document.createElement('div');
                groupDiv.className = 'inventory-group';

                const header = document.createElement('div');
                header.className = 'group-header';
                header.innerHTML = `
                    <span class="group-title">${material} - ${color}</span>
                    <span class="group-count">${items.length}</span>
                `;

                const itemsDiv = document.createElement('div');
                itemsDiv.className = 'group-items';

                items.forEach(item => {
                    const card = createItemCard(item);
                    itemsDiv.appendChild(card);
                });

                groupDiv.appendChild(header);
                groupDiv.appendChild(itemsDiv);
                container.appendChild(groupDiv);
            });
        }

        function groupByMaterialColor(items) {
            const groups = {};
            items.forEach(item => {
                const key = `${item.material || 'Unknown'}|${item.color || 'Unknown'}`;
                if (!groups[key]) groups[key] = [];
                groups[key].push(item);
            });
            return groups;
        }

        function createItemCard(item) {
            const card = document.createElement('div');
            card.className = 'item-card';

            const stockClass = item.qty <= 10 ? 'low' : item.qty <= 50 ? 'mid' : '';

            card.innerHTML = `
                <div class="item-header">
                    <div class="item-id">${item.id}</div>
                    <div class="item-badge">${item.status === 'storage' ? 'SPOOL' : 'BOX'}</div>
                </div>
                <div class="item-info">
                    <div class="item-brand">${item.brand || 'N/A'}</div>
                    <div class="item-meta">
                        <span class="meta-tag">${item.material}</span>
                        <span class="meta-tag">${item.color}</span>
                    </div>
                </div>
                <div class="stock-section">
                    <span class="stock-label">Stock Level</span>
                    <span class="stock-value ${stockClass}">${item.qty}%</span>
                </div>
            `;

            card.onclick = () => editItem(item.id);
            return card;
        }

        function updateStats() {
            const total = inventory.length;
            const lowStock = inventory.filter(item => item.qty <= 25).length;

            document.getElementById('total').textContent = total;
            document.getElementById('low-stock').textContent = lowStock;
        }

        function setTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + (tab === 'storage' ? 'spools' : 'boxes')).classList.add('active');
            renderInventory();
        }

        // ===== CAMERA & SCANNING =====
        async function openCamera(mode) {
            currentScanMode = mode;
            editingItemId = null;
            currentScanData = null;

            const label = document.getElementById('cam-label');
            const instruction = document.getElementById('cam-instruction');
            const shutter = document.getElementById('shutter');

            shutter.className = 'shutter';

            if (mode === 'delete') {
                label.textContent = 'DELETE MODE';
                instruction.textContent = 'Scan item to delete';
                shutter.classList.add('delete');
            } else if (mode === 'edit') {
                label.textContent = 'EDIT MODE';
                instruction.textContent = 'Scan item to edit';
                shutter.classList.add('edit');
            } else {
                label.textContent = 'SCANNER ACTIVE';
                instruction.textContent = 'Position barcode/serial in frame';
            }

            document.getElementById('camera').classList.add('active');

            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
                });
                document.getElementById('video').srcObject = stream;
            } catch (err) {
                showToast('Camera permission denied', 'error');
            }
        }

        function closeCamera() {
            document.getElementById('camera').classList.remove('active');
            document.getElementById('processing').classList.remove('active');
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
        }

        // ===== ACCURATE GEMINI SCANNING =====
        async function capture() {
            const apiKey = localStorage.getItem('geminiApiKey');
            if (!apiKey) return showToast('Please set API key first', 'error');

            const shutter = document.getElementById('shutter');
            shutter.disabled = true;

            document.getElementById('processing').classList.add('active');
            document.getElementById('proc-text').textContent = 'SCANNING';
            document.getElementById('proc-log').textContent = 'Processing image...';

            try {
                const canvas = document.getElementById('canvas');
                const video = document.getElementById('video');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);

                const imageData = canvas.toDataURL('image/jpeg').split(',')[1];

                let prompt = '';
                if (currentScanMode === 'scan') {
                    prompt = `Analyze this 3D printer filament product image carefully.

SPOOL (Opened): Look for a white/colored plastic reel with a unique serial number or QR code printed on the spool rim.
- Read the UNIQUE SERIAL NUMBER only (ignore any barcode on the spool body)
- Identify the material type (PLA, PETG, ABS, TPU, NYLON, etc.)
- Identify the filament color
- Identify the brand/manufacturer name

BOX (Unopened): Look for a cardboard box packaging.
- Read the BARCODE on the box
- Identify the material type from the box label
- Identify the filament color from the box
- Identify the brand name on the box

Return response ONLY as JSON (no other text):
{
  "id": "unique_id_read",
  "type": "box_or_spool",
  "brand": "brand_name",
  "material": "material_type",
  "color": "color_name"
}`;
                } else if (currentScanMode === 'edit') {
                    prompt = `Read the UNIQUE ID/SERIAL NUMBER from this filament product. Return only JSON: {"id": "exact_id_read"}`;
                } else {
                    prompt = `Read the ID/BARCODE to delete. Return only JSON: {"id": "id_to_delete"}`;
                }

                document.getElementById('proc-log').textContent = 'Sending to Gemini...';

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-exp:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: prompt },
                                {
                                    inline_data: {
                                        mime_type: 'image/jpeg',
                                        data: imageData
                                    }
                                }
                            ]
                        }],
                        generationConfig: {
                            temperature: 0.1,
                            topK: 10,
                            topP: 0.8
                        }
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error?.message || 'API Error');
                }

                document.getElementById('proc-log').textContent = 'Parsing results...';

                const result = await response.json();
                const text = result.candidates[0].content.parts[0].text;

                let data;
                try {
                    data = JSON.parse(text);
                } catch {
                    const jsonMatch = text.match(/\{[\s\S]*\}/);
                    if (!jsonMatch) throw new Error('Invalid response format');
                    data = JSON.parse(jsonMatch[0]);
                }

                closeCamera();

                if (!data.id) {
                    showToast('Could not read ID. Try better lighting.', 'error');
                    shutter.disabled = false;
                    return;
                }

                if (currentScanMode === 'delete') {
                    const item = inventory.find(i => i.id.toUpperCase() === data.id.toUpperCase());
                    if (item && confirm(`Delete ${item.id}?`)) {
                        inventory = inventory.filter(i => i.id !== item.id);
                        saveInventory();
                        showToast('Item deleted', 'success');
                        renderInventory();
                        updateStats();
                    }
                    shutter.disabled = false;
                    return;
                }

                if (currentScanMode === 'edit') {
                    const item = inventory.find(i => i.id.toUpperCase() === data.id.toUpperCase());
                    if (!item) {
                        showToast('Item not found', 'error');
                        shutter.disabled = false;
                        return;
                    }
                    editingItemId = item.id;
                    showEditModal(item);
                    shutter.disabled = false;
                    return;
                }

                const existing = inventory.find(i => i.id.toUpperCase() === data.id.toUpperCase());
                if (existing) {
                    showToast('Item already exists', 'error');
                    shutter.disabled = false;
                    return;
                }

                currentScanData = {
                    id: data.id,
                    brand: data.brand || '',
                    material: data.material || '',
                    color: data.color || '',
                    status: data.type === 'box' ? 'inventory' : 'storage',
                    qty: data.type === 'box' ? 100 : 100
                };

                showScanModal(currentScanData);
                shutter.disabled = false;

            } catch (error) {
                showToast(`Error: ${error.message}`, 'error');
                closeCamera();
                shutter.disabled = false;
            }
        }

        // ===== MODAL FUNCTIONS =====
        function showScanModal(data) {
            document.getElementById('modal-title').textContent = 'NEW ITEM';
            document.getElementById('f-status').value = data.status;
            document.getElementById('f-id').value = data.id;
            document.getElementById('f-brand').value = data.brand;
            document.getElementById('f-material').value = data.material;
            document.getElementById('f-color').value = data.color;
            document.getElementById('f-qty').value = data.qty;
            document.getElementById('modal').classList.add('active');
        }

        function showEditModal(item) {
            document.getElementById('modal-title').textContent = 'EDIT ITEM';
            document.getElementById('f-status').value = item.status;
            document.getElementById('f-id').value = item.id;
            document.getElementById('f-brand').value = item.brand;
            document.getElementById('f-material').value = item.material;
            document.getElementById('f-color').value = item.color;
            document.getElementById('f-qty').value = item.qty;
            document.getElementById('modal').classList.add('active');
        }

        function openManualEntry() {
            currentScanData = null;
            editingItemId = null;
            document.getElementById('modal-title').textContent = 'MANUAL ENTRY';
            document.getElementById('f-status').value = 'storage';
            document.getElementById('f-id').value = '';
            document.getElementById('f-brand').value = '';
            document.getElementById('f-material').value = '';
            document.getElementById('f-color').value = '';
            document.getElementById('f-qty').value = '100';
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            currentScanData = null;
            editingItemId = null;
        }

        function saveItem() {
            const id = document.getElementById('f-id').value.trim().toUpperCase();
            const status = document.getElementById('f-status').value;
            const brand = document.getElementById('f-brand').value.trim();
            const material = document.getElementById('f-material').value.trim();
            const color = document.getElementById('f-color').value.trim();
            const qty = parseInt(document.getElementById('f-qty').value);

            if (!id) return showToast('ID is required', 'error');
            if (!material) return showToast('Material is required', 'error');
            if (!color) return showToast('Color is required', 'error');

            if (editingItemId) {
                const index = inventory.findIndex(i => i.id === editingItemId);
                if (index !== -1) {
                    inventory[index] = { id, status, brand, material, color, qty, timestamp: Date.now() };
                    showToast('Item updated', 'success');
                }
            } else {
                if (inventory.find(i => i.id === id)) {
                    return showToast('ID already exists', 'error');
                }
                inventory.push({ id, status, brand, material, color, qty, timestamp: Date.now() });
                showToast('Item added', 'success');
            }

            saveInventory();
            closeModal();
            renderInventory();
            updateStats();
        }

        function editItem(id) {
            const item = inventory.find(i => i.id === id);
            if (item) {
                editingItemId = id;
                showEditModal(item);
            }
        }

        function saveInventory() {
            localStorage.setItem('filamentDB', JSON.stringify(inventory));
        }

        // ===== TOAST =====
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast active ${type}`;
            setTimeout(() => toast.classList.remove('active'), 3000);
        }
    </script>
</body>
</html>
