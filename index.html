<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Filament OS — Terminal</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --surface-hover: #1f1f1f;
            --yellow: #FFD700;
            --yellow-dim: rgba(255, 215, 0, 0.2);
            --border: #333333;
            --text: #ffffff;
            --text-dim: #888888;
            --red: #FF4444;
            --green: #00FF88;
        }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15), rgba(0,0,0,0.15) 1px, transparent 1px, transparent 2px);
            pointer-events: none; z-index: 999;
        }
        
        .container { max-width: 600px; margin: 0 auto; position: relative; padding-bottom: 120px; }
        
        header { background: var(--surface); border-bottom: 2px solid var(--yellow); padding: 16px 20px; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(255, 215, 0, 0.1); }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .logo { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 800; color: var(--yellow); letter-spacing: 1px; }
        .sync-status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--green); font-weight: 700; font-family: 'JetBrains Mono', monospace; }
        .sync-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 8px var(--green); } 50% { opacity: 0.5; transform: scale(0.8); } }
        
        .user-bar { display: flex; justify-content: space-between; align-items: center; }
        .user-info { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-dim); }
        .btn-group { display: flex; gap: 8px; }
        .header-btn { background: transparent; border: 1px solid var(--border); color: var(--text-dim); padding: 6px 12px; border-radius: 4px; font-size: 11px; font-weight: 700; cursor: pointer; transition: 0.2s; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; }
        .header-btn:hover { border-color: var(--yellow); color: var(--yellow); }
        
        .stats { padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; border-left: 3px solid var(--yellow); }
        .stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; font-weight: 700; letter-spacing: 1px; margin-bottom: 4px; }
        .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 28px; font-weight: 800; color: var(--text); }
        
        .tabs { display: flex; padding: 0 20px; gap: 8px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; text-align: center; font-weight: 700; font-size: 12px; cursor: pointer; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
        .tab.active { background: var(--yellow-dim); color: var(--yellow); border-color: var(--yellow); }
        
        .search { padding: 0 20px; margin-bottom: 24px; }
        .search-input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 14px 16px; color: var(--text); font-size: 14px; outline: none; font-family: 'JetBrains Mono', monospace; }
        .search-input:focus { border-color: var(--yellow); box-shadow: 0 0 15px var(--yellow-dim); }
        
        .inventory { padding: 0 20px; }
        .item { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 16px; display: grid; grid-template-columns: 70px 1fr 60px auto auto; gap: 12px; align-items: center; margin-bottom: 12px; }
        .item:hover { border-color: var(--yellow); }
        .item-id { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 800; color: var(--bg); background: var(--yellow); padding: 6px 8px; border-radius: 4px; text-align: center; word-break: break-all; }
        .item.box .item-id { background: var(--green); }
        .item-info { display: flex; flex-direction: column; }
        .item-brand { font-weight: 700; font-size: 14px; margin-bottom: 2px; }
        .item-meta { font-size: 11px; color: var(--text-dim); }
        .item-qty { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 800; color: var(--yellow); text-align: center; }
        
        .item-actions { display: flex; gap: 6px; }
        .action-btn { width: 32px; height: 32px; background: var(--surface-hover); border: 1px solid var(--border); border-radius: 4px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .action-btn:hover { border-color: var(--yellow); }
        .action-btn.delete:hover { border-color: var(--red); color: var(--red); }
        
        .actions { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 600px; background: var(--bg); border-top: 2px solid var(--yellow); padding: 12px 20px; display: flex; gap: 10px; z-index: 50; }
        .btn-main { flex: 2; padding: 14px; border-radius: 6px; border: none; background: var(--yellow); color: var(--bg); font-weight: 800; font-size: 12px; cursor: pointer; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; }
        .btn-secondary { flex: 1; padding: 14px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); font-weight: 700; font-size: 11px; cursor: pointer; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; }
        .btn-secondary:hover { border-color: var(--yellow); color: var(--yellow); }
        .btn-danger { border-color: var(--red); color: var(--red); }
        .btn-danger:hover { background: rgba(255, 68, 68, 0.1); border-color: var(--red); }
        
        .camera { position: fixed; inset: 0; background: #000; z-index: 400; display: none; flex-direction: column; }
        .camera.active { display: flex; }
        .camera-header { padding: 20px; display: flex; justify-content: space-between; position: absolute; width: 100%; z-index: 10; }
        .camera-badge { background: var(--yellow); color: var(--bg); padding: 6px 12px; border-radius: 4px; font-weight: 800; font-size: 11px; font-family: 'JetBrains Mono', monospace; }
        .camera-badge.delete { background: var(--red); }
        .camera-close { background: rgba(0,0,0,0.5); border: 1px solid var(--yellow); color: var(--yellow); width: 36px; height: 36px; border-radius: 4px; font-size: 18px; cursor: pointer; }
        #video { flex: 1; object-fit: cover; }
        
        .camera-controls { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); text-align: center; width: 100%; }
        .shutter { width: 72px; height: 72px; border: 4px solid var(--yellow); background: var(--yellow-dim); border-radius: 50%; cursor: pointer; box-shadow: 0 0 20px rgba(255,215,0,0.4); }
        .shutter:active { background: var(--yellow); transform: scale(0.95); }
        .shutter.delete { border-color: var(--red); background: rgba(255,68,68,0.2); box-shadow: 0 0 20px rgba(255,68,68,0.4); }
        .shutter.delete:active { background: var(--red); }
        #canvas { display: none; }
        
        .processing { position: absolute; inset: 0; background: rgba(0, 0, 0, 0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 20; }
        .processing.active { display: flex; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--surface); border-top: 4px solid var(--yellow); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .process-text { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700; color: var(--yellow); }
        
        .modal { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); z-index: 450; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal.open { display: flex; }
        .modal-content { background: var(--surface); border: 2px solid var(--yellow); border-radius: 8px; padding: 24px; width: 100%; max-width: 400px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 16px; margin-bottom: 20px; }
        .modal-title { font-family: 'JetBrains Mono', monospace; font-weight: 800; color: var(--yellow); font-size: 16px; }
        
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 10px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; }
        .form-input, .form-select { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 12px; color: var(--text); font-size: 14px; outline: none; font-family: 'Inter', sans-serif; }
        .form-input:focus, .form-select:focus { border-color: var(--yellow); }
        .form-input[readonly] { color: var(--yellow); font-family: 'JetBrains Mono', monospace; font-weight: 700; background: var(--surface-hover); }
        
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--yellow); color: var(--bg); padding: 12px 24px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-weight: 800; font-size: 12px; z-index: 600; display: none; text-align: center; }
        .toast.error { background: var(--red); color: white; }
        
        .login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 500; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-screen.hidden { display: none; }
        .login-box { background: var(--surface); border: 2px solid var(--border); border-left: 4px solid var(--yellow); border-radius: 8px; padding: 32px; width: 100%; max-width: 360px; }
        .login-logo { font-family: 'JetBrains Mono', monospace; font-size: 28px; font-weight: 900; color: var(--yellow); margin-bottom: 24px; letter-spacing: 1px; text-align: center; }
        
        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-dim); }
    </style>
</head>
<body>

<div class="login-screen" id="login-screen">
    <div class="login-box">
        <div class="login-logo">FILAMENT_OS</div>
        <div class="form-group">
            <label class="form-label">System Access ID</label>
            <input type="text" class="form-input" id="member-id" placeholder="Enter Approved Name..." style="font-family: 'JetBrains Mono', monospace; text-align: center;">
        </div>
        <button class="btn-main" onclick="login()" style="width:100%; margin-top:8px;">INITIALIZE</button>
    </div>
</div>

<div class="container" id="main-app" style="display: none;">
    <header>
        <div class="header-row">
            <div class="logo">SYS_OS</div>
            <div class="sync-status"><div class="sync-dot"></div><span>LOCAL</span></div>
        </div>
        <div class="user-bar">
            <div class="user-info">OP: <span id="user-name" style="color:var(--text); font-weight:700;">User</span></div>
            <div class="btn-group">
                <button class="header-btn" onclick="setApiKey()">API_KEY</button>
                <button class="header-btn" onclick="logout()">LOGOUT</button>
            </div>
        </div>
    </header>

    <div class="stats">
        <div class="stat-card">
            <div class="stat-label">Total Assets</div>
            <div class="stat-value" id="total">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Empty Spools</div>
            <div class="stat-value" id="low-stock" style="color:var(--red);">0</div>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active" id="tab-storage" onclick="setTab('storage')">Storage (Spool)</div>
        <div class="tab" id="tab-inventory" onclick="setTab('inventory')">Inventory (Box)</div>
    </div>

    <div class="search">
        <input type="text" class="search-input" id="search" placeholder="> search asset..." onkeyup="renderInventory()">
    </div>

    <div class="inventory" id="inventory"></div>
</div>

<div class="actions" id="action-bar" style="display: none;">
    <button class="btn-secondary btn-danger" onclick="openCamera('delete')">RM_ASSET</button>
    <button class="btn-main" onclick="openCamera('scan')">SCAN_ASSET</button>
    <button class="btn-secondary" onclick="emptySpoolDialog()">EMPTY</button>
</div>

<div class="camera" id="camera">
    <div class="camera-header">
        <div class="camera-badge" id="cam-badge">SCANNER_ACTIVE</div>
        <button class="camera-close" onclick="closeCamera()">✕</button>
    </div>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    <div class="camera-controls">
        <div style="font-family: 'JetBrains Mono', monospace; font-size:11px; color:var(--yellow); background:rgba(0,0,0,0.8); padding:8px 16px; border-radius:4px; margin-bottom:20px; display:inline-block; border:1px solid var(--yellow);">
            > ALLOW AUTO-FOCUS BEFORE TAP <
        </div><br>
        <button class="shutter" id="shutter" onclick="capture()"></button>
    </div>
    <div class="processing" id="processing">
        <div class="spinner"></div>
        <div class="process-text">ANALYZING...</div>
    </div>
</div>

<div class="modal" id="modal">
    <div class="modal-content">
        <div class="modal-header">
            <div class="modal-title">ASSET_DATA</div>
            <button class="camera-close" onclick="closeModal()">✕</button>
        </div>
        
        <div class="form-group">
            <label class="form-label">Physical State</label>
            <select id="f-status" class="form-input" onchange="updateStockOptions()">
                <option value="storage">Storage (Opened Spool)</option>
                <option value="inventory">Inventory (Unopened Box)</option>
            </select>
        </div>

        <div class="form-group">
            <label class="form-label">Asset Tag (Serial)</label>
            <input type="text" id="f-id" class="form-input" readonly>
        </div>

        <div class="form-group">
            <label class="form-label">Manufacturer</label>
            <input type="text" id="f-brand" class="form-input">
        </div>

        <div class="form-group">
            <label class="form-label">Material Type</label>
            <select id="f-material" class="form-input">
                <option value="">Select...</option>
                <option value="PLA">PLA</option>
                <option value="PETG">PETG</option>
                <option value="ABS">ABS</option>
                <option value="ASA">ASA</option>
                <option value="TPU">TPU</option>
                <option value="NYLON">NYLON</option>
            </select>
        </div>

        <div class="form-group">
            <label class="form-label">Color Profile</label>
            <input type="text" id="f-color" class="form-input">
        </div>

        <div class="form-group">
            <label class="form-label">Volume Remaining</label>
            <select id="f-qty" class="form-input">
                <option value="100">100%</option>
                <option value="90">90%</option>
                <option value="80">80%</option>
                <option value="70">70%</option>
                <option value="60">60%</option>
                <option value="50">50%</option>
                <option value="40">40%</option>
                <option value="30">30%</option>
                <option value="20">20%</option>
                <option value="10">10%</option>
                <option value="0">0% (Empty)</option>
            </select>
        </div>

        <button class="btn-main" style="width:100%; margin-top:16px;" onclick="saveItem()">WRITE_TO_DB</button>
    </div>
</div>

<div class="modal" id="empty-modal">
    <div class="modal-content">
        <div class="modal-header">
            <div class="modal-title">EMPTY_SPOOL</div>
            <button class="camera-close" onclick="closeEmptyModal()">✕</button>
        </div>
        
        <div class="form-group">
            <label class="form-label">Enter Asset ID</label>
            <input type="text" id="empty-id" class="form-input" placeholder="Asset ID to mark empty...">
        </div>

        <button class="btn-main" style="width:100%;" onclick="confirmEmpty()">MARK_EMPTY</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCLlCKwujLGtQw9DEvHl-ZYW1Z0cK8Xw-E",
        authDomain: "inventory-86d26.firebaseapp.com",
        projectId: "inventory-86d26",
        storageBucket: "inventory-86d26.firebasestorage.app",
        messagingSenderId: "833068204777",
        appId: "1:833068204777:web:09b2c6cedde4cfb199a678",
        databaseURL: "https://inventory-86d26-default-rtdb.europe-west1.firebasedatabase.app"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let inventory = [];
    let activeUser = localStorage.getItem('activeUser');
    let currentTab = 'storage';
    let currentScanMode = 'scan';
    let stream = null;

    const allowedUsers = ["benjamin", "christian", "rahul"];

    function login() {
        let inputId = document.getElementById('member-id').value.trim();
        if(!inputId) return showToast('ERROR: NAME REQUIRED', 'error');
        
        if (!allowedUsers.includes(inputId.toLowerCase())) {
            return showToast('ERROR: ACCESS DENIED', 'error');
        }

        activeUser = inputId.charAt(0).toUpperCase() + inputId.slice(1).toLowerCase();
        localStorage.setItem('activeUser', activeUser);
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-app').style.display = 'block';
        document.getElementById('action-bar').style.display = 'flex';
        document.getElementById('user-name').textContent = activeUser;
        syncData();
    }

    function logout() {
        localStorage.removeItem('activeUser');
        location.reload();
    }

    function setApiKey() {
        const k = prompt("Enter Groq API Key:", localStorage.getItem('groqKey') || "");
        if(k) {
            localStorage.setItem('groqKey', k);
            showToast('API_KEY_SAVED', '');
        }
    }

    function syncData() {
        db.ref('inventory').on('value', (snapshot) => {
            const data = snapshot.val();
            inventory = data ? Object.values(data).sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0)) : [];
            renderInventory();
            updateStats();
        });
    }

    function updateStats() {
        const total = inventory.length;
        const empty = inventory.filter(i => i.qty === 0 || i.qty === '0').length;
        document.getElementById('total').textContent = total;
        document.getElementById('low-stock').textContent = empty;
    }

    function renderInventory() {
        const container = document.getElementById('inventory');
        const search = document.getElementById('search').value.toLowerCase();
        container.innerHTML = '';

        let filtered = inventory;
        if (currentTab === 'storage') filtered = filtered.filter(i => i.status === 'storage');
        else if (currentTab === 'inventory') filtered = filtered.filter(i => i.status === 'inventory');

        if (search) {
            filtered = filtered.filter(i =>
                String(i.id).toLowerCase().includes(search) ||
                String(i.brand).toLowerCase().includes(search) ||
                String(i.color).toLowerCase().includes(search)
            );
        }

        if (!filtered.length) {
            container.innerHTML = '<div class="empty-state">NO_ASSETS_FOUND</div>';
            return;
        }

        filtered.forEach(item => {
            const isBox = item.status === 'inventory';
            const html = `
                <div class="item ${isBox ? 'box' : ''}">
                    <div class="item-id">${item.id}</div>
                    <div class="item-info">
                        <div class="item-brand">${item.brand || 'UNKNOWN'}</div>
                        <div class="item-meta">${item.type || ''} • ${item.color || 'N/A'}</div>
                    </div>
                    <div class="item-qty">${item.qty}%</div>
                    <div class="item-actions">
                        <button class="action-btn" onclick='editItem(${JSON.stringify(item)})'>✏️</button>
                        <button class="action-btn delete" onclick="deleteItem('${item.id}')">🗑️</button>
                    </div>
                </div>
            `;
            container.innerHTML += html;
        });
    }

    function setTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        renderInventory();
    }

    function editItem(item) {
        document.getElementById('f-status').value = item.status;
        document.getElementById('f-id').value = item.id;
        document.getElementById('f-brand').value = item.brand || '';
        document.getElementById('f-material').value = item.type || '';
        document.getElementById('f-color').value = item.color || '';
        document.getElementById('f-qty').value = item.qty || 100;
        updateStockOptions();
        document.getElementById('modal').classList.add('open');
    }

    function deleteItem(id) {
        if (confirm(`DELETE_ASSET: ${id}?`)) {
            db.ref('inventory/' + id).remove();
        }
    }

    function updateStockOptions() {
        const status = document.getElementById('f-status').value;
        const qtySelect = document.getElementById('f-qty');
        
        if (status === 'inventory') {
            qtySelect.innerHTML = '<option value="100">100%</option>';
            qtySelect.value = '100';
        }
    }

    function saveItem() {
        const id = document.getElementById('f-id').value.toUpperCase();
        if (!id) return showToast('ERROR: INVALID_ID', 'error');

        db.ref('inventory/' + id).set({
            id: id,
            brand: document.getElementById('f-brand').value,
            type: document.getElementById('f-material').value,
            color: document.getElementById('f-color').value,
            qty: parseInt(document.getElementById('f-qty').value),
            status: document.getElementById('f-status').value,
            user: activeUser,
            timestamp: Date.now()
        });
        closeModal();
        showToast('ASSET_SAVED', '');
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('open');
    }

    function emptySpoolDialog() {
        document.getElementById('empty-modal').classList.add('open');
    }

    function closeEmptyModal() {
        document.getElementById('empty-modal').classList.remove('open');
    }

    function confirmEmpty() {
        const id = document.getElementById('empty-id').value.trim().toUpperCase();
        if (!id) return showToast('ERROR: ENTER_ID', 'error');
        
        const item = inventory.find(i => String(i.id).toUpperCase() === id);
        if (!item) return showToast('ERROR: ASSET_NOT_FOUND', 'error');
        
        db.ref('inventory/' + item.id).update({ qty: 0 });
        closeEmptyModal();
        document.getElementById('empty-id').value = '';
        showToast('MARKED_EMPTY', '');
    }

    async function openCamera(mode) {
        currentScanMode = mode;
        document.getElementById('camera').classList.add('active');
        
        const badge = document.getElementById('cam-badge');
        const shutter = document.getElementById('shutter');
        
        if (mode === 'delete') {
            badge.textContent = 'DELETE_MODE';
            badge.classList.add('delete');
            shutter.classList.add('delete');
        } else {
            badge.textContent = 'SCANNER_ACTIVE';
            badge.classList.remove('delete');
            shutter.classList.remove('delete');
        }

        try {
            stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'environment', width: { ideal: 1280 } } 
            });
            document.getElementById('video').srcObject = stream;
        } catch(e) {
            showToast('ERROR: CAMERA_ACCESS', 'error');
        }
    }

    function closeCamera() {
        document.getElementById('camera').classList.remove('active');
        if(stream) stream.getTracks().forEach(t => t.stop());
        document.getElementById('processing').classList.remove('active');
    }

    async function capture() {
        const GROQ_KEY = localStorage.getItem('groqKey');
        if(!GROQ_KEY) return showToast('ERROR: SET_API_KEY', 'error');

        document.getElementById('processing').classList.add('active');
        const vid = document.getElementById('video');
        const canvas = document.getElementById('canvas');

        const scale = Math.min(1, 800 / vid.videoWidth);
        canvas.width = vid.videoWidth * scale;
        canvas.height = vid.videoHeight * scale;
        canvas.getContext('2d').drawImage(vid, 0, 0, canvas.width, canvas.height);
        let base64 = canvas.toDataURL('image/jpeg', 0.8);

        try {
            const prompt = currentScanMode === 'delete' 
                ? `Find the asset ID/serial visible. Return: {"id":"..."}`
                : `Detect SPOOL or BOX. If SPOOL: extract serial (000M123456789), type, color. If BOX: extract barcode, type, color. Return: {"type":"spool"|"box", "id":"...", "type":"PLA|ABS|PETG|etc", "color":"...", "brand":"..."}`;

            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${GROQ_KEY}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: "meta-llama/llama-4-scout-17b-16e-instruct",
                    messages: [{
                        role: "user",
                        content: [
                            { type: "text", text: prompt },
                            { type: "image_url", image_url: { url: base64 } }
                        ]
                    }],
                    temperature: 0.1
                })
            });

            if (!res.ok) throw new Error('API Error');

            const data = await res.json();
            const content = data.choices[0].message.content;
            
            let result = null;
            try {
                result = JSON.parse(content);
            } catch(e) {
                const match = content.match(/\{[\s\S]*\}/);
                if (match) result = JSON.parse(match[0]);
            }

            if (!result || !result.id) throw new Error('ID_NOT_FOUND');

            if (currentScanMode === 'delete') {
                const item = inventory.find(i => String(i.id).toUpperCase() === String(result.id).toUpperCase());
                if (item) {
                    db.ref('inventory/' + item.id).remove();
                    showToast('ASSET_DELETED', '');
                } else {
                    showToast('ASSET_NOT_IN_DB', 'error');
                }
                closeCamera();
                return;
            }

            const exists = inventory.find(i => String(i.id).toUpperCase() === String(result.id).toUpperCase());
            if (exists) {
                closeCamera();
                editItem(exists);
                return;
            }

            document.getElementById('f-id').value = result.id;
            document.getElementById('f-brand').value = result.brand || '';
            document.getElementById('f-material').value = result.type || '';
            document.getElementById('f-color').value = result.color || '';
            document.getElementById('f-status').value = result.type === 'spool' ? 'storage' : 'inventory';
            document.getElementById('f-qty').value = result.type === 'spool' ? '100' : '100';
            updateStockOptions();
            closeCamera();
            document.getElementById('modal').classList.add('open');

        } catch (e) {
            showToast('ERROR: ' + e.message, 'error');
        } finally {
            document.getElementById('processing').classList.remove('active');
        }
    }

    function showToast(msg, type) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.className = 'toast' + (type === 'error' ? ' error' : '');
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 2000);
    }

    if(activeUser) {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-app').style.display = 'block';
        document.getElementById('action-bar').style.display = 'flex';
        document.getElementById('user-name').textContent = activeUser;
        syncData();
    }
</script>
</body>
</html>
