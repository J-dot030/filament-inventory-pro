<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpoolVault — Lindner Filament Inventory</title>
    
    <script src="https://www.gstatic.com/firebasejs/11.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.1.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/@zxing/library@0.20.0"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --surface-hover: #1f1f1f;
            --accent: #FFD700;
            --accent-dim: rgba(255, 215, 0, 0.2);
            --border: #333333;
            --text: #ffffff;
            --text-dim: #888888;
            --error: #FF4444;
            --success: #00FF88;
            --info: #4A9EFF;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15), rgba(0,0,0,0.15) 1px, transparent 1px, transparent 2px); pointer-events: none; z-index: 999; }
        .container { max-width: 600px; margin: 0 auto; position: relative; padding-bottom: 120px; }
        
        header { background: var(--surface); border-bottom: 3px solid var(--accent); padding: 16px 20px; position: sticky; top: 0; z-index: 100; box-shadow: 0 8px 32px rgba(255, 215, 0, 0.15); }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .logo-container { display: flex; align-items: center; gap: 12px; }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--accent) 0%, #FFA500 100%); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 0 20px rgba(255, 215, 0, 0.4); }
        .logo-text { font-family: 'Space Mono', monospace; font-size: 18px; font-weight: 700; color: var(--accent); }
        .logo-badge { font-size: 8px; color: var(--success); font-weight: 700; letter-spacing: 2px; margin-top: -2px; }
        .sync-status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--success); font-weight: 700; }
        .sync-dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .user-bar { display: flex; justify-content: space-between; align-items: center; }
        .user-info { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text-dim); display: flex; align-items: center; gap: 8px; }
        .user-badge { background: var(--accent); color: var(--bg); padding: 3px 8px; border-radius: 12px; font-size: 10px; font-weight: 700; }
        .header-btn { background: transparent; border: 1px solid var(--border); color: var(--text-dim); padding: 6px 12px; border-radius: 6px; font-size: 11px; cursor: pointer; transition: 0.2s; }
        .header-btn:hover { border-color: var(--accent); color: var(--accent); }
        
        .stats { padding: 20px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
        .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; border-left: 4px solid var(--accent); }
        .stat-label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; font-weight: 700; margin-bottom: 4px; }
        .stat-value { font-family: 'Space Mono', monospace; font-size: 24px; font-weight: 700; color: var(--accent); }
        
        .tabs { display: flex; padding: 0 20px; gap: 8px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; text-align: center; font-weight: 700; font-size: 11px; cursor: pointer; color: var(--text-dim); text-transform: uppercase; transition: 0.2s; }
        .tab:hover { border-color: var(--accent); }
        .tab.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }
        
        .search { padding: 0 20px; margin-bottom: 24px; }
        .search-input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; color: var(--text); font-size: 14px; outline: none; transition: 0.2s; }
        .search-input:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-dim); }
        
        .inventory { padding: 0 20px; }
        .item { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; display: grid; grid-template-columns: 60px 1fr 50px auto auto; gap: 12px; align-items: center; margin-bottom: 12px; transition: 0.2s; }
        .item:hover { border-color: var(--accent); background: var(--surface-hover); }
        .item-type { font-family: 'Space Mono', monospace; font-size: 9px; font-weight: 700; color: var(--bg); background: var(--accent); padding: 4px 8px; border-radius: 4px; text-align: center; }
        .item-type.box { background: var(--info); }
        .item-info { display: flex; flex-direction: column; }
        .item-brand { font-weight: 700; font-size: 14px; margin-bottom: 2px; }
        .item-meta { font-size: 10px; color: var(--text-dim); display: flex; gap: 8px; flex-wrap: wrap; }
        .item-qty { font-family: 'Space Mono', monospace; font-size: 16px; font-weight: 700; color: var(--success); text-align: center; }
        .item-actions { display: flex; gap: 6px; }
        .action-btn { width: 32px; height: 32px; background: var(--surface-hover); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .action-btn:hover { border-color: var(--accent); }
        .action-btn.delete:hover { border-color: var(--error); color: var(--error); }
        
        .actions { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 600px; background: var(--bg); border-top: 2px solid var(--accent); padding: 12px 20px; display: flex; gap: 10px; z-index: 50; }
        .btn-main { flex: 2; padding: 14px; border-radius: 8px; border: none; background: linear-gradient(135deg, var(--accent) 0%, #FFA500 100%); color: var(--bg); font-weight: 800; font-size: 12px; cursor: pointer; text-transform: uppercase; font-family: 'Space Mono', monospace; transition: 0.2s; }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 215, 0, 0.4); }
        .btn-secondary { flex: 1; padding: 14px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); font-weight: 700; font-size: 11px; cursor: pointer; text-transform: uppercase; font-family: 'Space Mono', monospace; transition: 0.2s; }
        .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
        
        .camera { position: fixed; inset: 0; background: #000; z-index: 400; display: none; flex-direction: column; }
        .camera.active { display: flex; }
        .camera-header { padding: 20px; display: flex; justify-content: space-between; position: absolute; width: 100%; z-index: 20; }
        .camera-badge { background: var(--accent); color: var(--bg); padding: 8px 16px; border-radius: 6px; font-weight: 800; font-size: 12px; }
        .camera-close { background: rgba(255, 215, 0, 0.1); border: 2px solid var(--accent); color: var(--accent); width: 44px; height: 44px; border-radius: 8px; font-size: 20px; cursor: pointer; transition: 0.2s; }
        .camera-close:hover { background: var(--accent); color: var(--bg); }
        #video { flex: 1; object-fit: cover; width: 100%; height: 100%; }
        .camera-controls { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); text-align: center; }
        .shutter { width: 80px; height: 80px; border: 4px solid var(--accent); background: rgba(255, 215, 0, 0.1); border-radius: 50%; cursor: pointer; box-shadow: 0 0 25px rgba(255, 215, 0, 0.5); transition: 0.1s; }
        .shutter:active { background: var(--accent); transform: scale(0.95); }
        #canvas { display: none; }
        
        .processing { position: absolute; inset: 0; background: rgba(0, 0, 0, 0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 20; }
        .processing.active { display: flex; }
        .spinner { width: 50px; height: 50px; border: 4px solid var(--surface); border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .process-text { font-family: 'Space Mono', monospace; font-size: 14px; font-weight: 700; color: var(--accent); text-align: center; }
        
        .modal { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.9); z-index: 450; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal.open { display: flex; }
        .modal-content { background: var(--surface); border: 2px solid var(--accent); border-radius: 12px; padding: 28px; width: 100%; max-width: 420px; max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border); padding-bottom: 16px; margin-bottom: 20px; }
        .modal-title { font-family: 'Space Mono', monospace; font-weight: 800; color: var(--accent); font-size: 16px; }
        .modal-close { background: transparent; border: none; color: var(--accent); font-size: 24px; cursor: pointer; transition: 0.2s; }
        .modal-close:hover { transform: rotate(90deg); }
        
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 10px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; }
        .form-input, .form-select { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; color: var(--text); font-size: 14px; outline: none; font-family: 'Inter', sans-serif; transition: 0.2s; }
        .form-input:focus, .form-select:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-dim); }
        
        .ai-badge { display: inline-block; background: rgba(0, 255, 136, 0.15); color: var(--success); padding: 4px 8px; border-radius: 4px; font-size: 9px; font-weight: 700; text-transform: uppercase; border: 1px solid rgba(0, 255, 136, 0.3); }
        
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--accent); color: var(--bg); padding: 14px 28px; border-radius: 8px; font-family: 'Space Mono', monospace; font-weight: 800; font-size: 12px; z-index: 600; display: none; text-align: center; box-shadow: 0 8px 25px rgba(255, 215, 0, 0.4); animation: slide-down 0.3s ease-out; }
        @keyframes slide-down { from { transform: translateX(-50%) translateY(-100%); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
        .toast.error { background: var(--error); }
        .toast.success { background: var(--success); color: var(--bg); }
        
        .login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 500; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-screen.hidden { display: none; }
        .login-box { background: var(--surface); border: 2px solid var(--border); border-left: 4px solid var(--accent); border-radius: 12px; padding: 40px; width: 100%; max-width: 380px; }
        .login-logo-big { display: flex; flex-direction: column; align-items: center; margin-bottom: 32px; }
        .login-logo-icon { width: 72px; height: 72px; background: linear-gradient(135deg, var(--accent) 0%, #FFA500 100%); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 40px; box-shadow: 0 0 30px rgba(255, 215, 0, 0.4); margin-bottom: 20px; }
        .login-logo-text { font-family: 'Space Mono', monospace; font-size: 26px; font-weight: 800; color: var(--accent); }
        .login-logo-sub { font-size: 11px; color: var(--text-dim); font-weight: 600; letter-spacing: 3px; margin-top: 6px; }
        
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-dim); }
        .empty-icon { font-size: 48px; margin-bottom: 16px; }
        .empty-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
        
        .users-list { max-height: 300px; overflow-y: auto; }
        .user-item { background: var(--surface-hover); border: 1px solid var(--border); border-radius: 6px; padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .user-item-info { display: flex; flex-direction: column; }
        .user-item-name { font-weight: 700; font-size: 13px; }
        .user-item-time { font-size: 10px; color: var(--text-dim); }
        .user-online { background: var(--success); width: 8px; height: 8px; border-radius: 50%; }
    </style>
</head>
<body>

<!-- CAMERA -->
<div class="camera" id="camera">
    <div class="camera-header">
        <div class="camera-badge">📷 SCANNING</div>
        <button class="camera-close" onclick="closeCamera()">×</button>
    </div>
    <video id="video" autoplay playsinline></video>
    <div class="camera-controls">
        <button class="shutter" onclick="captureImage()"></button>
    </div>
    <div class="processing" id="processing">
        <div class="spinner"></div>
        <div class="process-text" id="processText">Claude Vision Analyzing...</div>
    </div>
</div>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
    <div class="login-box">
        <div class="login-logo-big">
            <div class="login-logo-icon">📦</div>
            <div class="login-logo-text">SPOOLV</div>
            <div class="login-logo-sub">VAULT</div>
        </div>
        
        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label class="form-label">Lindner Team</label>
                <select id="loginUsername" class="form-select" required>
                    <option value="">Select name...</option>
                    <option value="Benjamin">Benjamin</option>
                    <option value="Christian">Christian</option>
                    <option value="Rahul">Rahul</option>
                </select>
            </div>
            <button type="submit" class="btn-main" style="width: 100%;">ACCESS</button>
        </form>
        
        <div style="margin-top: 20px; text-align: center; color: var(--text-dim); font-size: 11px;">
            Lindner Team • Real-Time Inventory
        </div>
    </div>
</div>

<!-- MAIN APP -->
<div class="container" id="mainApp" style="display: none;">
    <header>
        <div class="header-row">
            <div class="logo-container">
                <div class="logo-icon">📦</div>
                <div>
                    <div class="logo-text">SPOOLV</div>
                    <div class="logo-badge">LIVE SYNC</div>
                </div>
            </div>
            <div class="sync-status">
                <div class="sync-dot"></div>
                <span>CONNECTED</span>
            </div>
        </div>
        
        <div class="user-bar">
            <div class="user-info">
                👤 <span id="userDisplay">User</span>
                <span class="user-badge" id="activeCount">0</span>
            </div>
            <button class="header-btn" onclick="showActiveUsers()">👥</button>
            <button class="header-btn" onclick="logout()">Logout</button>
        </div>
    </header>
    
    <div class="stats">
        <div class="stat-card">
            <div class="stat-label">Unopened</div>
            <div class="stat-value" id="statBoxes">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Spools</div>
            <div class="stat-value" id="statSpools">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Empty</div>
            <div class="stat-value" id="statEmpty">0</div>
        </div>
    </div>
    
    <div class="tabs">
        <button class="tab active" onclick="switchTab('inventory')">📋 All</button>
        <button class="tab" onclick="switchTab('boxes')">📦 Boxes</button>
        <button class="tab" onclick="switchTab('spools')">🔴 Spools</button>
    </div>
    
    <div class="search">
        <input type="text" class="search-input" id="searchInput" placeholder="Search brand, color, serial..." oninput="filterInventory()">
    </div>
    
    <div class="inventory" id="inventoryView">
        <div class="empty-state">
            <div class="empty-icon">📭</div>
            <div class="empty-title">No Inventory</div>
        </div>
    </div>
</div>

<!-- ACTIONS -->
<div class="actions" id="actions" style="display: none;">
    <button class="btn-main" onclick="openCamera()">📷 SCAN</button>
    <button class="btn-secondary" onclick="openAddModal()">➕ ADD</button>
    <button class="btn-secondary" onclick="openDeleteModal()">🗑️</button>
</div>

<!-- ADD MODAL -->
<div class="modal" id="addModal">
    <div class="modal-content">
        <div class="modal-header">
            <div class="modal-title">ADD ITEM</div>
            <button class="modal-close" onclick="closeAddModal()">×</button>
        </div>
        
        <form onsubmit="handleAddItem(event)">
            <div class="form-group">
                <label class="form-label">Type</label>
                <select id="formType" class="form-select" onchange="updateFormForType()" required>
                    <option value="">Select...</option>
                    <option value="box">📦 Unopened Box</option>
                    <option value="spool">🔴 Opened Spool</option>
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-label">Brand <span class="ai-badge" id="aiBrand"></span></label>
                <input type="text" id="formBrand" class="form-input" placeholder="Prusament..." required>
            </div>
            
            <div class="form-group">
                <label class="form-label">Material <span class="ai-badge" id="aiMaterial"></span></label>
                <select id="formMaterial" class="form-select" required>
                    <option value="">Select...</option>
                    <option value="PLA">PLA</option>
                    <option value="PLA+">PLA+</option>
                    <option value="PETG">PETG</option>
                    <option value="ABS">ABS</option>
                    <option value="TPU">TPU</option>
                    <option value="Nylon">Nylon</option>
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-label">Color <span class="ai-badge" id="aiColor"></span></label>
                <input type="text" id="formColor" class="form-input" placeholder="Red..." required>
            </div>
            
            <div class="form-group">
                <label class="form-label">Serial/QR Code</label>
                <input type="text" id="formSerial" class="form-input" placeholder="13-char or QR code">
            </div>
            
            <div class="form-group">
                <label class="form-label">Weight (g)</label>
                <input type="number" id="formWeight" class="form-input" placeholder="1000" required>
            </div>
            
            <div class="form-group" id="diameterGroup">
                <label class="form-label">Diameter (mm)</label>
                <input type="number" id="formDiameter" class="form-input" placeholder="1.75" step="0.01">
            </div>
            
            <div class="form-group" id="remainingGroup" style="display: none;">
                <label class="form-label">Remaining %</label>
                <input type="number" id="formRemaining" class="form-input" placeholder="100" min="0" max="100" value="100">
            </div>
            
            <div class="form-group" id="quantityGroup" style="display: none;">
                <label class="form-label">Batch Quantity</label>
                <input type="number" id="formQuantity" class="form-input" placeholder="How many boxes?" min="1" value="1">
            </div>
            
            <button type="submit" class="btn-main" style="width: 100%;">SAVE</button>
        </form>
    </div>
</div>

<!-- DELETE MODAL -->
<div class="modal" id="deleteModal">
    <div class="modal-content">
        <div class="modal-header">
            <div class="modal-title">DELETE ITEM</div>
            <button class="modal-close" onclick="closeDeleteModal()">×</button>
        </div>
        <div id="deleteList" style="max-height: 400px; overflow-y: auto;"></div>
    </div>
</div>

<!-- ACTIVE USERS MODAL -->
<div class="modal" id="usersModal">
    <div class="modal-content">
        <div class="modal-header">
            <div class="modal-title">ACTIVE USERS</div>
            <button class="modal-close" onclick="closeUsersModal()">×</button>
        </div>
        <div class="users-list" id="usersList"></div>
    </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
    // Firebase Config - UPDATE WITH YOUR CREDENTIALS
    const firebaseConfig = {
        apiKey: "AIzaSyBzH4Cqv6h_5m0-2K1L9pQr_wX8yZ3aB4c",
        authDomain: "spoolv-lindner.firebaseapp.com",
        projectId: "spoolv-lindner",
        storageBucket: "spoolv-lindner.appspot.com",
        messagingSenderId: "123456789012",
        appId: "1:123456789012:web:abcdefghijklmnop"
    };
    
    // Claude API
    const CLAUDE_API_KEY = "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";
    const CLAUDE_API_URL = "https://api.anthropic.com/v1/messages";
    
    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    // State
    let currentUser = null;
    let inventory = [];
    let currentTab = 'inventory';
    
    // Login
    function handleLogin(event) {
        event.preventDefault();
        const username = document.getElementById('loginUsername').value;
        const allowedUsers = ['Benjamin', 'Christian', 'Rahul'];
        
        if (!username || !allowedUsers.includes(username)) {
            showToast('❌ Access Denied', 'error');
            return;
        }
        
        currentUser = { name: username, uid: username.toLowerCase() };
        
        // Set user presence
        const userRef = database.ref(`users/${currentUser.uid}`);
        userRef.set({
            name: username,
            lastSeen: new Date().toISOString(),
            status: 'online'
        });
        
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('actions').style.display = 'flex';
        document.getElementById('userDisplay').textContent = username;
        
        loadInventory();
        loadActiveUsers();
        showToast(`✅ Welcome ${username}!`, 'success');
    }
    
    function logout() {
        if (currentUser) {
            database.ref(`users/${currentUser.uid}`).remove();
        }
        currentUser = null;
        document.getElementById('loginScreen').classList.remove('hidden');
        document.getElementById('mainApp').style.display = 'none';
        document.getElementById('actions').style.display = 'none';
        inventory = [];
        showToast('Logged out', 'success');
    }
    
    // Inventory - Real-time sync
    function loadInventory() {
        const ref = database.ref('inventory');
        ref.on('value', (snapshot) => {
            inventory = [];
            snapshot.forEach((child) => {
                inventory.push({ id: child.key, ...child.val() });
            });
            renderInventory();
            updateStats();
        });
    }
    
    function renderInventory() {
        const container = document.getElementById('inventoryView');
        const search = document.getElementById('searchInput').value.toLowerCase();
        
        let filtered = inventory;
        
        if (currentTab === 'boxes') {
            filtered = filtered.filter(i => i.type === 'box');
        } else if (currentTab === 'spools') {
            filtered = filtered.filter(i => i.type === 'spool');
        }
        
        filtered = filtered.filter(item => {
            const text = `${item.brand} ${item.color} ${item.material} ${item.serial || ''}`.toLowerCase();
            return text.includes(search);
        });
        
        if (filtered.length === 0) {
            container.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-title">No items</div></div>';
            return;
        }
        
        container.innerHTML = filtered.map(item => `
            <div class="item">
                <div class="item-type ${item.type === 'box' ? 'box' : ''}">${item.type === 'box' ? '📦' : '🔴'}</div>
                <div class="item-info">
                    <div class="item-brand">${item.brand}${item.aiDetected ? '<span class="ai-badge">AI</span>' : ''}</div>
                    <div class="item-meta">
                        <span>${item.color}</span>
                        <span>${item.material}</span>
                        ${item.serial ? `<span>ID: ${item.serial.substring(0, 8)}</span>` : ''}
                    </div>
                </div>
                <div class="item-qty">${item.type === 'box' ? item.quantity : item.remaining}${item.type === 'box' ? '📦' : '%'}</div>
                <div class="item-actions">
                    <button class="action-btn" onclick="editItem('${item.id}')">✏️</button>
                    <button class="action-btn delete" onclick="deleteItem('${item.id}')">🗑️</button>
                </div>
            </div>
        `).join('');
    }
    
    function filterInventory() {
        renderInventory();
    }
    
    function updateStats() {
        const boxes = inventory.filter(i => i.type === 'box').length;
        const spools = inventory.filter(i => i.type === 'spool').length;
        const empty = inventory.filter(i => i.type === 'spool' && i.remaining === 0).length;
        
        document.getElementById('statBoxes').textContent = boxes;
        document.getElementById('statSpools').textContent = spools;
        document.getElementById('statEmpty').textContent = empty;
        document.getElementById('activeCount').textContent = boxes + spools;
    }
    
    function updateFormForType() {
        const type = document.getElementById('formType').value;
        if (type === 'box') {
            document.getElementById('diameterGroup').style.display = 'none';
            document.getElementById('remainingGroup').style.display = 'none';
            document.getElementById('quantityGroup').style.display = 'block';
        } else {
            document.getElementById('diameterGroup').style.display = 'block';
            document.getElementById('remainingGroup').style.display = 'block';
            document.getElementById('quantityGroup').style.display = 'none';
        }
    }
    
    function openAddModal() {
        document.getElementById('addModal').classList.add('open');
        clearForm();
    }
    
    function closeAddModal() {
        document.getElementById('addModal').classList.remove('open');
    }
    
    function clearForm() {
        document.getElementById('formType').value = '';
        document.getElementById('formBrand').value = '';
        document.getElementById('formMaterial').value = '';
        document.getElementById('formColor').value = '';
        document.getElementById('formSerial').value = '';
        document.getElementById('formWeight').value = '';
        document.getElementById('formDiameter').value = '';
        document.getElementById('formRemaining').value = '100';
        document.getElementById('formQuantity').value = '1';
        document.getElementById('aiBrand').textContent = '';
        document.getElementById('aiMaterial').textContent = '';
        document.getElementById('aiColor').textContent = '';
    }
    
    function handleAddItem(event) {
        event.preventDefault();
        
        const type = document.getElementById('formType').value;
        const brand = document.getElementById('formBrand').value;
        const material = document.getElementById('formMaterial').value;
        const color = document.getElementById('formColor').value;
        const serial = document.getElementById('formSerial').value;
        const weight = parseInt(document.getElementById('formWeight').value);
        
        if (type === 'box') {
            const quantity = parseInt(document.getElementById('formQuantity').value);
            // Batch add - create sub-IDs
            for (let i = 1; i <= quantity; i++) {
                const id = `${serial}-${String(i).padStart(2, '0')}`;
                database.ref(`inventory/${id}`).set({
                    type: 'box',
                    brand, material, color, serial, weight, quantity: 1,
                    aiDetected: !!document.getElementById('aiBrand').textContent,
                    createdAt: new Date().toISOString(),
                    createdBy: currentUser.name
                });
            }
            showToast(`✅ Added ${quantity} boxes`, 'success');
        } else {
            const id = Date.now().toString();
            const diameter = parseFloat(document.getElementById('formDiameter').value);
            const remaining = parseInt(document.getElementById('formRemaining').value);
            
            database.ref(`inventory/${id}`).set({
                type: 'spool',
                brand, material, color, serial, weight, diameter, remaining,
                aiDetected: !!document.getElementById('aiBrand').textContent,
                createdAt: new Date().toISOString(),
                createdBy: currentUser.name
            });
            showToast('✅ Spool added', 'success');
        }
        
        closeAddModal();
    }
    
    function deleteItem(id) {
        if (confirm('Delete this item?')) {
            database.ref(`inventory/${id}`).remove();
            showToast('Deleted', 'success');
        }
    }
    
    function editItem(id) {
        const item = inventory.find(i => i.id === id);
        if (!item) return;
        
        document.getElementById('formType').value = item.type;
        updateFormForType();
        document.getElementById('formBrand').value = item.brand;
        document.getElementById('formMaterial').value = item.material;
        document.getElementById('formColor').value = item.color;
        document.getElementById('formSerial').value = item.serial || '';
        document.getElementById('formWeight').value = item.weight;
        if (item.type === 'spool') {
            document.getElementById('formDiameter').value = item.diameter;
            document.getElementById('formRemaining').value = item.remaining;
        }
        openAddModal();
    }
    
    function openDeleteModal() {
        const list = document.getElementById('deleteList');
        if (inventory.length === 0) {
            list.innerHTML = '<p style="color: var(--text-dim); text-align: center;">No items</p>';
        } else {
            list.innerHTML = inventory.map(item => `
                <div style="background: var(--surface-hover); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 8px; cursor: pointer;" onclick="deleteItem('${item.id}')">
                    <div style="font-weight: 700;">${item.type === 'box' ? '📦' : '🔴'} ${item.brand} - ${item.color}</div>
                    <div style="font-size: 11px; color: var(--text-dim);">${item.material} • ${item.weight}g</div>
                </div>
            `).join('');
        }
        document.getElementById('deleteModal').classList.add('open');
    }
    
    function closeDeleteModal() {
        document.getElementById('deleteModal').classList.remove('open');
    }
    
    // Camera
    async function openCamera() {
        document.getElementById('camera').classList.add('active');
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment' }
            });
            document.getElementById('video').srcObject = stream;
        } catch (err) {
            showToast('Camera access denied', 'error');
        }
    }
    
    function closeCamera() {
        const video = document.getElementById('video');
        if (video.srcObject) {
            video.srcObject.getTracks().forEach(track => track.stop());
        }
        document.getElementById('camera').classList.remove('active');
    }
    
    function captureImage() {
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        
        showProcessing(true);
        processImageWithAI(canvas.toDataURL('image/jpeg', 0.9));
    }
    
    async function processImageWithAI(imageData) {
        try {
            document.getElementById('processText').textContent = 'Claude analyzing label...';
            
            const base64Image = imageData.split(',')[1];
            
            const response = await fetch(CLAUDE_API_URL, {
                method: 'POST',
                headers: {
                    'x-api-key': CLAUDE_API_KEY,
                    'anthropic-version': '2023-06-01',
                    'content-type': 'application/json'
                },
                body: JSON.stringify({
                    model: 'claude-3-5-sonnet-20241022',
                    max_tokens: 1024,
                    messages: [{
                        role: 'user',
                        content: [
                            {
                                type: 'image',
                                source: { type: 'base64', media_type: 'image/jpeg', data: base64Image }
                            },
                            {
                                type: 'text',
                                text: `Read this filament label. Extract EXACT information in JSON:
{
    "brand": "brand name",
    "material": "PLA|PLA+|PETG|ABS|TPU|Nylon|Other",
    "color": "color description",
    "weight": "number (grams)",
    "serial": "13-char code or null",
    "is_unopened_box": true/false,
    "confidence": "high|medium|low"
}

Return ONLY JSON, no markdown.`
                            }
                        ]
                    }]
                })
            });
            
            const data = await response.json();
            if (!response.ok) throw new Error(data.error?.message);
            
            let jsonStr = data.content[0].text;
            if (jsonStr.includes('```')) {
                jsonStr = jsonStr.split('```')[1] || jsonStr.split('```')[0];
            }
            
            const extracted = JSON.parse(jsonStr.trim());
            
            if (extracted.brand) document.getElementById('formBrand').value = extracted.brand;
            if (extracted.material) document.getElementById('formMaterial').value = extracted.material;
            if (extracted.color) document.getElementById('formColor').value = extracted.color;
            if (extracted.weight) document.getElementById('formWeight').value = extracted.weight;
            if (extracted.serial) document.getElementById('formSerial').value = extracted.serial;
            
            const type = extracted.is_unopened_box ? 'box' : 'spool';
            document.getElementById('formType').value = type;
            updateFormForType();
            
            const badge = `✓ ${extracted.confidence}`;
            if (extracted.brand) document.getElementById('aiBrand').textContent = badge;
            if (extracted.material) document.getElementById('aiMaterial').textContent = badge;
            if (extracted.color) document.getElementById('aiColor').textContent = badge;
            
            showProcessing(false);
            closeCamera();
            openAddModal();
            showToast(`✅ ${extracted.brand} detected (${extracted.confidence})`, 'success');
            
        } catch (err) {
            showProcessing(false);
            showToast('Analysis failed: ' + err.message, 'error');
        }
    }
    
    function showProcessing(show) {
        document.getElementById('processing').classList.toggle('active', show);
    }
    
    // Users
    function loadActiveUsers() {
        const ref = database.ref('users');
        ref.on('value', (snapshot) => {
            const users = [];
            snapshot.forEach((child) => {
                users.push({ name: child.val().name, lastSeen: child.val().lastSeen });
            });
        });
    }
    
    function showActiveUsers() {
        const ref = database.ref('users');
        ref.once('value', (snapshot) => {
            const list = document.getElementById('usersList');
            let html = '';
            snapshot.forEach((child) => {
                const user = child.val();
                html += `
                    <div class="user-item">
                        <div class="user-item-info">
                            <div class="user-item-name">${user.name}</div>
                            <div class="user-item-time">${new Date(user.lastSeen).toLocaleTimeString()}</div>
                        </div>
                        <div class="user-online"></div>
                    </div>
                `;
            });
            list.innerHTML = html || '<p style="color: var(--text-dim); text-align: center;">No active users</p>';
            document.getElementById('usersModal').classList.add('open');
        });
    }
    
    function closeUsersModal() {
        document.getElementById('usersModal').classList.remove('open');
    }
    
    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        const tabs = document.querySelectorAll('.tab');
        if (tab === 'inventory') tabs[0].classList.add('active');
        else if (tab === 'boxes') tabs[1].classList.add('active');
        else if (tab === 'spools') tabs[2].classList.add('active');
        renderInventory();
    }
    
    function showToast(message, type = 'info') {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.className = 'toast ' + type;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }
</script>
