<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Filament Inventory — Groq Powered</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg: #0a0a0a; --surface: #141414; --yellow: #FFD700; --yellow-dim: rgba(255, 215, 0, 0.2); --border: #333333; --text: #ffffff; --text-dim: #888888; --red: #FF4444; --green: #00FF88; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
        body::before { content: ''; position: fixed; inset: 0; background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1), rgba(0,0,0,0.1) 1px, transparent 1px, transparent 2px); pointer-events: none; z-index: 999; }
        .container { max-width: 600px; margin: 0 auto; padding-bottom: 120px; }
        header { background: var(--surface); border-bottom: 2px solid var(--yellow); padding: 16px 20px; position: sticky; top: 0; z-index: 100; }
        .logo { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 800; color: var(--yellow); display: flex; align-items: center; gap: 8px; }
        .stats { padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; border-left: 3px solid var(--yellow); }
        .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 28px; font-weight: 800; }
        .tabs { display: flex; padding: 0 20px; gap: 8px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; text-align: center; font-size: 12px; cursor: pointer; color: var(--text-dim); text-transform: uppercase; font-weight: 700; }
        .tab.active { background: var(--yellow-dim); color: var(--yellow); border-color: var(--yellow); }
        .inventory { padding: 0 20px; }
        .item { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 16px; display: flex; align-items: center; gap: 12px; margin-bottom: 8px; cursor: pointer; }
        .item-id { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 800; color: var(--bg); background: var(--yellow); padding: 4px 6px; border-radius: 4px; }
        .item.box .item-id { background: var(--green); }
        
        /* Split Brain Actions */
        .actions { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 600px; background: var(--bg); border-top: 2px solid var(--yellow); padding: 12px; display: flex; gap: 8px; z-index: 50; }
        .btn-main { flex: 1; padding: 14px 8px; border-radius: 6px; border: none; font-weight: 800; font-size: 12px; cursor: pointer; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; color: var(--bg); }
        .btn-spool { background: var(--yellow); }
        .btn-box { background: var(--green); }
        .btn-secondary { flex: 0.5; padding: 14px 8px; border-radius: 6px; border: 1px solid var(--red); background: transparent; color: var(--red); font-weight: 700; font-size: 11px; cursor: pointer; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; }
        
        .camera { position: fixed; inset: 0; background: #000; z-index: 400; display: none; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .shutter { width: 72px; height: 72px; border: 4px solid var(--yellow); background: var(--yellow-dim); border-radius: 50%; position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 401; }
        .shutter.box-mode { border-color: var(--green); background: rgba(0,255,136,0.2); }
        .shutter.delete { border-color: var(--red); background: rgba(255,68,68,0.2); }
        .processing { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 500; }
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid var(--yellow); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 600; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--surface); border: 2px solid var(--yellow); border-radius: 8px; padding: 24px; width: 100%; max-width: 400px; }
        .form-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 12px; color: var(--text); margin-bottom: 12px; outline: none; }
        .login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 800; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-box { background: var(--surface); border: 2px solid var(--border); border-left: 4px solid var(--yellow); padding: 32px; width: 100%; max-width: 360px; text-align: center; }
    </style>
</head>
<body>

    <div class="login-screen" id="login-screen">
        <div class="login-box">
            <div style="font-family: 'JetBrains Mono', monospace; font-size: 22px; color: var(--yellow); margin-bottom: 20px; font-weight: 900;">🧵 FILAMENT INVENTORY</div>
            <input type="text" class="form-input" id="member-id" placeholder="Benjamin/Christian/Rahul" style="text-align: center;">
            <button class="btn-main btn-spool" onclick="login()" style="width: 100%;">ACCESS_SYSTEM</button>
        </div>
    </div>

    <div class="container" id="main-app" style="display: none;">
        <header>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div class="logo">🧵 Filament Inventory</div>
                <div style="font-size:10px; color:var(--red); font-weight:bold; cursor:pointer;" onclick="logout()">LOGOUT</div>
            </div>
            <div style="font-size:11px; color:var(--text-dim); margin-top:8px;">
                OP: <span id="user-name" style="color:white; font-weight:bold;">-</span> | 
                <span onclick="setGroqKey()" style="color:var(--yellow); cursor:pointer; font-weight:bold;">UPDATE GROQ KEY</span>
            </div>
        </header>

        <div class="stats">
            <div class="stat-card">
                <div style="font-size:10px; color:var(--text-dim);">TOTAL ASSETS</div>
                <div class="stat-value" id="total">0</div>
            </div>
            <div class="stat-card" style="border-left-color: var(--red);">
                <div style="font-size:10px; color:var(--text-dim);">EMPTY SPOOLS</div>
                <div class="stat-value" id="low-stock" style="color:var(--red);">0</div>
            </div>
        </div>

        <div class="tabs">
            <div class="tab active" id="tab-storage" onclick="setTab('storage')">Spools</div>
            <div class="tab" id="tab-inventory" onclick="setTab('inventory')">Boxes</div>
        </div>

        <div class="search"><input type="text" class="search-input" id="search" placeholder="> Search inventory..." onkeyup="renderInventory()"></div>
        <div class="inventory" id="inventory"></div>
    </div>

    <div class="actions" id="action-bar" style="display: none;">
        <button class="btn-secondary" onclick="openCamera('delete')">EMPTY</button>
        <button class="btn-main btn-box" onclick="openCamera('box')">SCAN BOX</button>
        <button class="btn-main btn-spool" onclick="openCamera('spool')">SCAN SPOOL</button>
    </div>

    <div class="camera" id="camera">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas" style="display:none;"></canvas>
        <button class="shutter" id="shutter" onclick="capture()"></button>
        <button onclick="closeCamera()" style="position:absolute; top:20px; right:20px; background:rgba(0,0,0,0.5); color:white; border:1px solid var(--yellow); padding:10px; border-radius:4px; cursor:pointer; z-index: 402;">✕</button>
        
        <div style="position:absolute; bottom:130px; left:50%; transform:translateX(-50%); text-align:center; width:100%; z-index: 402;">
            <div style="font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--yellow); background:rgba(0,0,0,0.8); padding:8px 16px; border-radius:4px; display:inline-block;" id="scan-instructions">
                > HOLD CLOSE TO BARCODE <
            </div>
        </div>

        <div class="processing" id="processing"><div class="spinner"></div><div style="color:var(--yellow); font-family:'JetBrains Mono'; font-weight:800;">GROQ_UPLINKING...</div></div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <div style="color:var(--yellow); font-weight:800; margin-bottom:15px; font-family:'JetBrains Mono';">ASSET_DATA</div>
            <select id="f-status" class="form-input"><option value="storage">Storage (Spool)</option><option value="inventory">Inventory (Box)</option></select>
            <input type="text" id="f-id" class="form-input" readonly style="color: var(--yellow); font-family: 'JetBrains Mono', monospace; font-weight: bold;">
            <input type="text" id="f-brand" class="form-input" placeholder="Brand">
            <input type="text" id="f-material" class="form-input" placeholder="Material">
            <input type="text" id="f-color" class="form-input" placeholder="Color">
            <select id="f-qty" class="form-input"><option value="100">100% Full</option><option value="50">50% Half</option><option value="10">10% Low</option><option value="0">Empty</option></select>
            <button class="btn-main btn-spool" style="width:100%;" onclick="saveItem()">COMMIT_TO_CLOUD</button>
            <button class="btn-secondary" onclick="document.getElementById('modal').style.display='none'" style="width:100%; margin-top:10px; border-color:#555; color:#888;">CANCEL</button>
        </div>
    </div>

    <script>
        // --- Firebase Setup ---
        const firebaseConfig = {
            apiKey: "AIzaSyCLlCKwujLGtQw9DEvHl-ZYW1Z0cK8Xw-E",
            authDomain: "inventory-86d26.firebaseapp.com",
            projectId: "inventory-86d26",
            storageBucket: "inventory-86d26.firebasestorage.app",
            messagingSenderId: "833068204777",
            appId: "1:833068204777:web:09b2c6cedde4cfb199a678",
            databaseURL: "https://inventory-86d26-default-rtdb.europe-west1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const inventoryRef = db.ref('inventory');

        let inventoryArr = [];
        let activeUser = localStorage.getItem('activeUser');
        let currentTab = 'storage';
        let currentScanMode = 'scan';

        if(activeUser) { loginSuccess(activeUser); }

        function login() {
            const name = document.getElementById('member-id').value.trim().toLowerCase();
            if (["benjamin", "christian", "rahul"].includes(name)) {
                activeUser = name.charAt(0).toUpperCase() + name.slice(1);
                localStorage.setItem('activeUser', activeUser);
                loginSuccess(activeUser);
            } else { alert("ACCESS DENIED"); }
        }

        function loginSuccess(user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('action-bar').style.display = 'flex';
            document.getElementById('user-name').textContent = user;
            syncData();
        }

        function logout() { localStorage.removeItem('activeUser'); location.reload(); }
        function setGroqKey() { const k = prompt("Enter Groq API Key:", localStorage.getItem('groqKey') || ""); if(k) localStorage.setItem('groqKey', k); }

        function syncData() {
            inventoryRef.on('value', (snapshot) => {
                const data = snapshot.val();
                inventoryArr = data ? Object.values(data) : [];
                renderInventory();
            });
        }

        function renderInventory() {
            const container = document.getElementById('inventory');
            const search = document.getElementById('search').value.toLowerCase();
            container.innerHTML = '';
            const filtered = inventoryArr.filter(item => {
                const match = (String(item.id) + String(item.brand) + String(item.color)).toLowerCase().includes(search);
                return match && item.status === currentTab;
            });
            filtered.forEach(item => {
                const div = document.createElement('div');
                div.className = item.status === 'inventory' ? 'item box' : 'item';
                div.onclick = () => {
                    document.getElementById('f-id').value = item.id;
                    document.getElementById('f-brand').value = item.brand || "";
                    document.getElementById('f-material').value = item.type || "";
                    document.getElementById('f-color').value = item.color || "";
                    document.getElementById('f-qty').value = item.qty || 100;
                    document.getElementById('f-status').value = item.status || "storage";
                    document.getElementById('modal').style.display = 'flex';
                };
                div.innerHTML = `<div class="item-id">${item.id}</div><div class="item-info"><div style="font-weight:700;">${item.brand || 'Unknown'} ${item.type || ''}</div><div style="font-size:11px; color:#888;">${item.color || 'N/A'} • OP: ${item.user}</div></div><div style="color:var(--yellow); font-weight:800;">${item.qty}%</div>`;
                container.appendChild(div);
            });
            document.getElementById('total').textContent = inventoryArr.length;
            document.getElementById('low-stock').textContent = inventoryArr.filter(i => i.qty <= 0).length;
        }

        function setTab(t) {
            currentTab = t;
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + t).classList.add('active');
            renderInventory();
        }

        function saveItem() {
            const id = String(document.getElementById('f-id').value).trim().toUpperCase();
            if (!id || id === 'UNKNOWN') return alert('INVALID ID');

            db.ref('inventory/' + id).set({
                id: id, 
                brand: document.getElementById('f-brand').value,
                type: document.getElementById('f-material').value.toUpperCase(),
                color: document.getElementById('f-color').value,
                qty: parseInt(document.getElementById('f-qty').value),
                status: document.getElementById('f-status').value,
                user: activeUser, 
                timestamp: Date.now()
            });
            document.getElementById('modal').style.display = 'none';
        }

        let stream;
        async function openCamera(mode) {
            currentScanMode = mode;
            const shutter = document.getElementById('shutter');
            const instructions = document.getElementById('scan-instructions');
            shutter.disabled = false;
            
            // Apply visual changes based on split-brain mode
            if (mode === 'box') {
                shutter.className = 'shutter box-mode';
                instructions.textContent = "> HOLD CLOSE TO BOX BARCODE <";
                instructions.style.color = "var(--green)";
                instructions.style.borderColor = "var(--green)";
            } else if (mode === 'spool') {
                shutter.className = 'shutter';
                instructions.textContent = "> CENTER SERIAL NUMBER IN VIEW <";
                instructions.style.color = "var(--yellow)";
                instructions.style.borderColor = "var(--yellow)";
            } else {
                shutter.className = 'shutter delete';
                instructions.textContent = "> SCAN ASSET TO PURGE <";
                instructions.style.color = "var(--red)";
                instructions.style.borderColor = "var(--red)";
            }

            document.getElementById('camera').style.display = 'block';
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1280 } } });
                document.getElementById('video').srcObject = stream;
            } catch(e) { alert("Camera Error. Please allow permissions."); }
        }

        function closeCamera() {
            document.getElementById('camera').style.display = 'none';
            if(stream) stream.getTracks().forEach(t => t.stop());
            document.getElementById('processing').style.display = 'none';
        }

        async function capture() {
            const GROQ_KEY = localStorage.getItem('groqKey');
            if(!GROQ_KEY) return alert("Please click 'UPDATE GROQ KEY' at the top first!");

            const shutterBtn = document.getElementById('shutter');
            if (shutterBtn.disabled) return;
            shutterBtn.disabled = true;

            document.getElementById('processing').style.display = 'flex';
            const vid = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            
            const scale = Math.min(1, 800 / vid.videoWidth);
            canvas.width = vid.videoWidth * scale;
            canvas.height = vid.videoHeight * scale;
            canvas.getContext('2d').drawImage(vid, 0, 0, canvas.width, canvas.height);
            const base64 = canvas.toDataURL('image/jpeg', 0.8); 

            try {
                // SPLIT-BRAIN PROMPT LOGIC
                let aiPrompt = "";
                let assignedStatus = "";

                if (currentScanMode === 'box') {
                    aiPrompt = "Extract the standard 1D barcode number from this cardboard box. Ignore everything else. Return strictly JSON: {\"asset_id\": \"barcode_number\", \"brand\": \"brand_name\", \"type\": \"material_type\", \"color\": \"color_name\", \"raw_text_lines\": [\"line1\", \"line2\"]}";
                    assignedStatus = "inventory";
                } else {
                    aiPrompt = "Analyze this 3D filament spool. Find the 13-character alphanumeric serial (3 digits, 'M', 9 digits). Slashed zero is '0'. Open top-right is '6'. Read every line of text on the label into the raw_text_lines array. Return strictly valid JSON: {\"brand\": \"string\", \"color\": \"string\", \"type\": \"string\", \"asset_id\": \"string\", \"raw_text_lines\": [\"line 1\", \"line 2\"]}";
                    assignedStatus = "storage";
                }

                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${GROQ_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "llama-3.2-90b-vision-preview",
                        messages: [{
                            role: "user",
                            content: [
                                { type: "text", text: aiPrompt },
                                { type: "image_url", image_url: { url: base64 } }
                            ]
                        }],
                        response_format: { type: "json_object" },
                        temperature: 0.1
                    })
                });
                
                if (!res.ok) {
                    throw new Error(`HTTP ${res.status}`);
                }

                const data = await res.json();
                const result = JSON.parse(data.choices[0].message.content);

                let finalId = result.asset_id ? String(result.asset_id).toUpperCase().replace(/[\s\-\.]/g, '') : null;

                // --- THE GEMINI JAVASCRIPT SAFETY NET (Restored for Spools) ---
                if (currentScanMode !== 'box') {
                    // Fallback 1: Scan every raw text line for the 'M' format
                    if (result.raw_text_lines && Array.isArray(result.raw_text_lines)) {
                        for (let line of result.raw_text_lines) {
                            let cleanLine = line.toUpperCase().replace(/[\s\-\.]/g, ''); 
                            if (cleanLine.length >= 12 && cleanLine.length <= 14 && cleanLine.includes('M')) {
                                let mIndex = cleanLine.indexOf('M');
                                if (mIndex >= 2 && mIndex <= 4) { finalId = cleanLine; break; }
                            }
                        }
                    }

                    // Fallback 2: Fix dot matrix errors
                    if (finalId) {
                        finalId = finalId.replace(/[OQD]/g, '0');
                        if (finalId.startsWith('888M')) finalId = '000M' + finalId.substring(4);
                        if (finalId.startsWith('846M')) finalId = '046M' + finalId.substring(4);
                        if (finalId.startsWith('800M')) finalId = '000M' + finalId.substring(4);

                        let mIndex = finalId.indexOf('M');
                        if (mIndex !== -1 && finalId.length > 13) {
                            let start = Math.max(0, mIndex - 3);
                            finalId = finalId.substring(start, start + 13);
                        }
                    }
                }

                if (!finalId || finalId === '' || finalId === 'NULL') {
                    alert('⚠️ SCAN REJECTED\n\nCould not read the tag cleanly. Please hold closer and ensure good lighting.');
                    shutterBtn.disabled = false;
                    document.getElementById('processing').style.display = 'none';
                    return;
                }

                const cleanExtractedId = finalId;

                // Delete Mode
                if(currentScanMode === 'delete') {
                    if(inventoryArr.find(i => String(i.id).trim().toUpperCase() === cleanExtractedId)) {
                        await db.ref('inventory/' + cleanExtractedId).remove();
                        alert("ASSET PURGED");
                    } else {
                        alert("ERROR: ID NOT FOUND");
                    }
                    closeCamera();
                    return;
                }

                // Duplicate Prevention Mode
                const existingItem = inventoryArr.find(i => String(i.id).trim().toUpperCase() === cleanExtractedId);
                if (existingItem) {
                    alert(`⚠️ DUPLICATE DETECTED\n\nAsset ID: ${cleanExtractedId} is already in the database. Opening record...`);
                    editItem(cleanExtractedId); 
                    closeCamera();
                    return; 
                }

                // Normal Mode
                document.getElementById('f-id').value = cleanExtractedId;
                document.getElementById('f-brand').value = result.brand || "";
                document.getElementById('f-material').value = result.type || "";
                document.getElementById('f-color').value = result.color || "";
                document.getElementById('f-qty').value = 100;
                document.getElementById('f-status').value = assignedStatus;
                document.getElementById('modal').style.display = 'flex';
                
                closeCamera();
                
            } catch (e) { 
                alert(`⚠️ API ERROR: ${e.message}\nMake sure your Groq key is correct.`); 
                shutterBtn.disabled = false;
                document.getElementById('processing').style.display = 'none';
            }
        }
    </script>
</body>
</html>
